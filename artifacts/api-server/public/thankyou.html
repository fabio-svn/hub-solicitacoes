<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitacao Enviada - Hub SVN</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-dark">
  <video autoplay loop muted playsinline style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0" id="bgVideo"></video>
  <div style="position:fixed;inset:0;background:rgba(20,12,10,0.80);mix-blend-mode:multiply;z-index:0"></div>

  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:24px">
    <div class="thankyou-card" style="opacity:0;transform:scale(0.95)" id="card">
      <div class="check-icon" id="checkIcon">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="26" stroke="#9f3f37" stroke-width="2" stroke-dasharray="164" stroke-dashoffset="164" id="checkCircle"/>
          <polyline points="18 28 25 35 38 22" stroke="#9f3f37" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="40" stroke-dashoffset="40" id="checkMark"/>
        </svg>
      </div>
      <h1 style="font-weight:700;font-size:1.6rem;margin-bottom:12px;opacity:0" id="title"></h1>
      <p style="font-weight:400;opacity:0;color:rgba(255,248,243,0.7);margin-bottom:28px" id="subtitle"></p>
      <a href="/dashboard.html" class="btn btn-primary" style="opacity:0" id="ctaBtn"></a>
      <div style="margin-top:40px;opacity:0" id="logoWrap">
        <img id="logo" style="height:24px;opacity:0.4" alt="SVN">
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('bgVideo').src = URL_VIDEO_HERO;
    document.getElementById('title').textContent = MSG_THANKYOU_TITULO;
    document.getElementById('subtitle').textContent = MSG_THANKYOU_SUBTITULO;
    document.getElementById('ctaBtn').textContent = MSG_THANKYOU_BOTAO;
    document.getElementById('logo').src = URL_LOGO_BRANCA;

    setTimeout(() => {
      const card = document.getElementById('card');
      card.style.transition = 'all 0.5s ease';
      card.style.opacity = '1';
      card.style.transform = 'scale(1)';
    }, 100);

    setTimeout(() => {
      document.getElementById('checkCircle').style.transition = 'stroke-dashoffset 0.8s ease';
      document.getElementById('checkCircle').style.strokeDashoffset = '0';
    }, 400);

    setTimeout(() => {
      document.getElementById('checkMark').style.transition = 'stroke-dashoffset 0.4s ease';
      document.getElementById('checkMark').style.strokeDashoffset = '0';
    }, 800);

    ['title', 'subtitle', 'ctaBtn', 'logoWrap'].forEach((id, i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        el.style.transition = 'opacity 0.4s ease';
        el.style.opacity = id === 'logoWrap' ? '1' : '1';
      }, 700 + i * 200);
    });
  </script>
</body>
</html>
