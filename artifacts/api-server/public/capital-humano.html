<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{const s=JSON.parse(localStorage.getItem('svn_layout_state')||'{}');if(s.isAdmin)document.documentElement.dataset.preShell='admin';}catch(e){}})()</script>
  <title>Capital Humano — Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    .ch-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px; }
    .ch-title { font-family: 'Taviraj', serif; font-weight: 300; margin: 0 0 6px; font-size: 1.8rem; color: var(--carbon-black, #221b19); }
    .ch-sub { font-size: 0.9rem; color: rgba(34,27,25,0.5); margin: 0 0 28px; }
    .ch-section { background: #fff; border: 1.5px solid #e8e2dc; border-radius: 16px; padding: 26px; margin-bottom: 16px; }
    .ch-section h2 { font-family: 'Taviraj', serif; font-weight: 400; font-size: 1.15rem; margin: 0 0 4px; color: var(--carbon-black, #221b19); }
    .ch-section .ch-secsub { font-size: 0.85rem; color: rgba(34,27,25,0.55); margin: 0 0 20px; }
    .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .ch-card { display: flex; align-items: center; gap: 12px; padding: 16px; border: 1.5px solid #e8e2dc; border-radius: 12px; text-decoration: none; color: var(--carbon-black,#221b19); background: #fff; transition: border-color .12s, transform .12s; }
    .ch-card:hover { border-color: #AC3631; transform: translateY(-1px); }
    .ch-card .ch-ico { flex: 0 0 38px; width: 38px; height: 38px; border-radius: 10px; background: rgba(172,54,49,0.08); color: #AC3631; display: flex; align-items: center; justify-content: center; }
    .ch-card .ch-cardlabel { font-size: 0.9rem; font-weight: 600; line-height: 1.25; }
  </style>
</head>
<body class="page-light">
  <div id="pageContent">
    <div class="ch-wrap">
      <h1 class="ch-title">Capital Humano</h1>
      <p class="ch-sub">Espaço do time de Capital Humano para solicitações exclusivas.</p>

      <div class="ch-section">
        <h2>Solicitações exclusivas</h2>
        <p class="ch-secsub">Formulários exclusivos do time de Capital Humano.</p>
        <div class="ch-grid">
          <a class="ch-card" href="/form-ch-kit-onboarding.html">
            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg></span>
            <span class="ch-cardlabel">Kit Onboarding</span>
          </a>

            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
            <span class="ch-cardlabel">Atualização de Pessoas nos Sites</span>
          </a>
          <a class="ch-card" href="/form-criacao-pdf.html?ch=1">
            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6M9 11h2"/></svg></span>
            <span class="ch-cardlabel">Conteúdo em PDF</span>
          </a>
          <a class="ch-card" href="/form-artes-divulgacao.html?ch=1">
            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span>
            <span class="ch-cardlabel">Arte de Divulgação</span>
          </a>
          <a class="ch-card" href="/form-ch-atualizacao-books.html">
            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></span>
            <span class="ch-cardlabel">Atualização de Books</span>

            <span class="ch-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-8a2 2 0 00-2-2H6a2 2 0 00-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v3M12 8v3M17 8v3"/><path d="M7 4h.01M12 4h.01M17 4h.01"/></svg></span>
            <span class="ch-cardlabel">Aniversariantes do Mês</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="shell.js"></script>
  <script>
    async function init() {
      try { if (typeof _configReady !== 'undefined') await _configReady; } catch(e) {}
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/capital-humano.html'; return; }
      const role = Auth.getUserRole();
      if (role !== 'capital_humano' && role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      if (typeof Shell !== 'undefined' && Shell.render) {
        Shell.render({ activeRoute: 'capital-humano', contentEl: document.getElementById('pageContent') });
      }
    }
    init();
  </script>
</body>
</html>
