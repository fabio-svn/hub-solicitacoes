<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conteúdo em PDF - Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="style.css">
  <script src="transitions.js"></script>
</head>
<body class="page-light">
  <header class="header" id="mainHeader"></header>
  <div class="container-narrow" style="padding-top:32px;padding-bottom:80px">
    <div class="form-card">
      <div class="form-progress"><div class="form-progress-bar" id="progressBar" style="width:33%"></div></div>
      <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:24px">
        <span style="font-size:0.8rem;opacity:0.4" id="stepLabel">Etapa 1 de 3</span>
      </div>
      <h2 style="font-weight:300;font-size:1.1rem;margin-bottom:20px;opacity:0.6" id="formTitle"></h2>

      <div class="form-step active" id="step1">
        <h2 style="font-weight:600;font-size:1.1rem;margin-bottom:20px">Dados do solicitante</h2>
        <div class="field">
          <label>Seu nome</label>
          <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>
        <div class="field">
          <label>Setor</label>
          <select id="setor" required></select>
        </div>
        <div class="form-nav">
          <button class="btn btn-primary" id="btnNext1" disabled onclick="goStep(2)">Próximo</button>
        </div>
      </div>

      <div class="form-step" id="step2">
        <h2 style="font-weight:600;font-size:1.1rem;margin-bottom:20px">Informações do material</h2>
        <div class="field">
          <label>Título do material</label>
          <input type="text" id="titulo" placeholder="Título do PDF" required>
        </div>
        <div class="field">
          <label>Finalidade do material</label>
          <textarea id="finalidade" placeholder="Para que será utilizado? Ex.: material de apoio para reuniao, apostila para treinamento..." required></textarea>
        </div>
        <div class="field">
          <label>Onde pretende compartilhar?</label>
          <div class="checkbox-group" id="canais">
            <label class="checkbox-option"><input type="checkbox" value="E-mail"><span class="checkbox-custom"></span><span>E-mail</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Feed do Instagram"><span class="checkbox-custom"></span><span>Feed do Instagram</span></label>
            <label class="checkbox-option"><input type="checkbox" value="LinkedIn"><span class="checkbox-custom"></span><span>LinkedIn</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Stories"><span class="checkbox-custom"></span><span>Stories</span></label>
            <label class="checkbox-option"><input type="checkbox" value="WhatsApp"><span class="checkbox-custom"></span><span>WhatsApp</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Outro" id="canalOutroCheck"><span class="checkbox-custom"></span><span>Outro</span></label>
          </div>
          <div id="canalOutroField" style="display:none;margin-top:8px">
            <input type="text" id="canalOutro" placeholder="Qual canal?">
          </div>
        </div>
        <div class="field">
          <label>Conteúdo que deve estar presente no material</label>
          <textarea id="conteudo" placeholder="Descreva o conteúdo, estrutura e informações que devem compor o PDF..." required></textarea>
        </div>
        <div class="field">
          <label>Arquivos de apoio ou referencia (opcional)</label>
          <div class="file-input-wrapper">
            <label class="file-input-btn" for="arquivoApoio">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Escolher arquivo
            </label>
            <input type="file" id="arquivoApoio">
            <div class="file-name" id="arquivoApoioName"></div>
          </div>
        </div>
        <div class="form-nav">
          <button class="btn btn-secondary" onclick="goStep(1)">Voltar</button>
          <button class="btn btn-primary" onclick="goStep(3)">Próximo</button>
        </div>
      </div>

      <div class="form-step" id="step3">
        <h2 style="font-weight:600;font-size:1.1rem;margin-bottom:20px">Informações adicionais</h2>
        <div class="field">
          <label>Público-alvo</label>
          <div class="checkbox-group" id="publico">
            <label class="checkbox-option"><input type="checkbox" value="Clientes"><span class="checkbox-custom"></span><span>Clientes</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Parceiros"><span class="checkbox-custom"></span><span>Parceiros</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Interno"><span class="checkbox-custom"></span><span>Interno</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Leads"><span class="checkbox-custom"></span><span>Leads</span></label>
            <label class="checkbox-option"><input type="checkbox" value="Divulgacao externa em massa"><span class="checkbox-custom"></span><span>Divulgação externa em massa</span></label>
          </div>
        </div>
        <div class="field">
          <label>Prazo desejado para entrega</label>
          <input type="date" id="prazoEntrega" required>
          <div class="field-hint">Prazo mínimo de produção: 3 dias úteis</div>
        </div>
        <div class="field">
          <label>Observações finais (opcional)</label>
          <textarea id="observacoes" placeholder="Informações adicionais..."></textarea>
        </div>
        <div style="border-top:1px solid rgba(34,27,25,.08);margin:28px 0 20px;padding-top:22px">
          <div class="form-nav">
            <button class="btn btn-secondary" onclick="goStep(2)">Voltar</button>
            <button class="btn btn-primary btn-submit-gold" id="btnSubmit" onclick="submitForm()">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a href="/solicitacoes.html" class="float-home" style="bottom:78px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    <span>Menu</span>
  </a>
  <a href="/" class="float-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Início</span>
  </a>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const subtipo = params.get('subtipo') || 'informativo';
    const TITLES = { informativo: 'PDF — Informativo', ebook: 'PDF — Ebook' };
    const TIPOS = { informativo: 'conteudo-pdf-informativo', ebook: 'conteudo-pdf-ebook' };

    async function init() {
      await _configReady;
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/form-criacao-pdf.html?subtipo=' + subtipo; return; }
      Auth.renderHeader(document.getElementById('mainHeader'));
      const _fl = document.getElementById('formLogo'); if (_fl) _fl.src = URL_LOGO_PRETA;
      document.getElementById('formTitle').textContent = TITLES[subtipo] || TITLES.informativo;
      document.getElementById('nome').value = Auth.getUserName();

      const sel = document.getElementById('setor');
      SETORES.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

      document.getElementById('nome').addEventListener('input', validate1);
      document.getElementById('setor').addEventListener('change', validate1);
      document.getElementById('canalOutroCheck').addEventListener('change', () => {
        document.getElementById('canalOutroField').style.display = document.getElementById('canalOutroCheck').checked ? 'block' : 'none';
      });
      document.getElementById('arquivoApoio').addEventListener('change', e => {
        const f = e.target.files[0];
        const el = document.getElementById('arquivoApoioName');
        el.innerHTML = f ? `<span style="display:flex;align-items:center;gap:6px;background:#d1fae5;padding:6px 10px;border-radius:6px;margin-top:6px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#065f46" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span style="color:#065f46;font-weight:600">${f.name}</span><span style="font-size:0.75rem;color:#065f46;opacity:0.7">${(f.size/1024).toFixed(0)} KB</span></span>` : '';
      });
      validate1();
    }

    function validate1() {
      const valid = document.getElementById('nome').value.trim() && document.getElementById('setor').value !== SETORES[0];
      document.getElementById('btnNext1').disabled = !valid;
    }

    function goStep(step) {
      document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
      document.getElementById('progressBar').style.width = (step / 3 * 100) + '%';
      document.getElementById('stepLabel').textContent = `Etapa ${step} de 3`;
      window.scrollTo(0, 0);
    }

    function validateRequiredFields() {
      document.querySelectorAll('.field-invalid').forEach(el => el.classList.remove('field-invalid'));
      const invalidFields = [];
      document.querySelectorAll('input[required], select[required], textarea[required]').forEach(input => {
        const step = input.closest('.form-step');
        if (step && !step.classList.contains('active')) return;
        const conditional = input.closest('.conditional-fields');
        if (conditional && !conditional.classList.contains('open')) return;
        const isEmpty = input.type === 'radio' || input.type === 'checkbox'
          ? !document.querySelector(`input[name="${input.name}"]:checked`)
          : !input.value.trim();
        if (isEmpty) {
          const fieldWrapper = input.closest('.field');
          if (fieldWrapper) {
            fieldWrapper.classList.add('field-invalid');
            let errorEl = fieldWrapper.querySelector('.field-error');
            if (!errorEl) {
              errorEl = document.createElement('div');
              errorEl.className = 'field-error';
              input.parentElement.appendChild(errorEl);
            }
            errorEl.textContent = 'Este campo é obrigatório.';
            invalidFields.push(fieldWrapper);
          }
        }
      });
      if (invalidFields.length > 0) {
        invalidFields[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
      }
      return true;
    }

    async function submitForm() {
      if (!validateRequiredFields()) return;
      const canais = [...document.querySelectorAll('#canais input:checked')].map(c => c.value);
      const público = [...document.querySelectorAll('#público input:checked')].map(c => c.value);

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Enviando...';

      const formData = new FormData();
      formData.append('tipo_solicitacao', TIPOS[subtipo] || TIPOS.informativo);
      formData.append('subtipo', subtipo);
      const dados = {
        nome: document.getElementById('nome').value,
        setor: document.getElementById('setor').value, titulo: document.getElementById('titulo').value,
        finalidade: document.getElementById('finalidade').value,
        canais: canais.join(', '),
        canalOutro: document.getElementById('canalOutro')?.value || '',
        conteúdo: document.getElementById('conteudo').value,
        público: público.join(', '),
        prazoEntrega: document.getElementById('prazoEntrega').value,
        observacoes: document.getElementById('observacoes').value,
      };
      formData.append('dados', JSON.stringify(dados));

      const file = document.getElementById('arquivoApoio').files[0];
      if (file) formData.append('arquivoApoio', file);

      try {
        const res = await fetch('/api/solicitacoes', { method: 'POST', body: formData });
        if (res.ok) {
          sessionStorage.removeItem('form-pdf');
          try {
            const resumo = {
              tipo: TIPO_SOLICITACAO_LABELS[formData.get('tipo_solicitacao')] || formData.get('tipo_solicitacao'),
              subtipo: formData.get('subtipo') || '', titulo: dados.nomeEvento || dados.tituloEvento || dados.titulo || dados.nomeCompleto || '',
              solicitante: dados.nome || Auth.getUserName(),
              setor: dados.setor || '',
              data: new Date().toLocaleDateString('pt-BR'),
              hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
              materiais: dados.materiais || [],
              natureza: dados.natureza || '',
              maturidade: dados.maturidade || '',
            };
            sessionStorage.setItem('svn_ultimo_resumo', JSON.stringify(resumo));
          } catch {}
          window.location.href = '/thankyou.html';
        }
        else { alert('Erro ao enviar.'); btn.disabled = false; btn.textContent = 'Enviar'; }
      } catch (e) { alert('Erro de conexão.'); btn.disabled = false; btn.textContent = 'Enviar'; }
    }

    function saveDraft() {
      try {
        sessionStorage.setItem('form-pdf', JSON.stringify({
          nome: document.getElementById('nome')?.value || '',
          setor: document.getElementById('setor')?.value || '', titulo: document.getElementById('titulo')?.value || '',
          finalidade: document.getElementById('finalidade')?.value || '',
          conteúdo: document.getElementById('conteudo')?.value || '',
          prazoEntrega: document.getElementById('prazoEntrega')?.value || '',
          observacoes: document.getElementById('observacoes')?.value || '',
        }));
      } catch {}
    }
    function restoreDraft() {
      try {
        const raw = sessionStorage.getItem('form-pdf');
        if (!raw) return;
        const d = JSON.parse(raw);
        for (const [k, v] of Object.entries(d)) {
          const el = document.getElementById(k);
          if (el) el.value = v;
        }
      } catch {}
    }
    document.querySelectorAll('input,textarea,select').forEach(el => el.addEventListener('change', saveDraft));
    restoreDraft();

    document.addEventListener('input', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid') && e.target.value.trim()) {
        field.classList.remove('field-invalid');
      }
    });
    document.addEventListener('change', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid')) {
        field.classList.remove('field-invalid');
      }
    });

    init();
  </script>
</body>
</html>
