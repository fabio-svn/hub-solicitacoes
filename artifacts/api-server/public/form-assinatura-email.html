<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assinatura de E-mail - Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-light">
  <div id="pageContent">
  <div class="container-narrow" style="padding-top:32px;padding-bottom:80px">

    <div class="form-card">
      <div class="form-progress"><div class="form-progress-bar" id="progressBar" style="width:100%"></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h2 style="font-weight:500;font-size:1.1rem;margin:0">Assinatura de E-mail</h2>
      </div>
      <div style="height:1px;background:var(--border-light);margin-bottom:24px"></div>

      <div class="alert-card alert-info" style="margin-bottom:24px">
        <div class="alert-title">Como funciona</div>
        <div class="alert-text">Preencha os dados abaixo para criação da sua assinatura de e-mail. Após o envio, a assinatura será gerada e entregue automaticamente.</div>
      </div>

      <div class="field">
        <label>Nome completo <span style="color:var(--ruby-red)">*</span></label>
        <input type="text" id="nomeCompleto" placeholder="Seu nome completo" required>
      </div>
      <div class="field">
        <label>Telefone / WhatsApp <span style="color:var(--ruby-red)">*</span></label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)" required>
      </div>
      <div class="field">
        <label>E-mail <span style="color:var(--ruby-red)">*</span></label>
        <div class="field-hint">Assessores: use seu e-mail de assessor. Time de Gestão: use seu e-mail corporativo.</div>
        <input type="email" id="emailCorporativo" placeholder="seu@svninvest.com.br" required>
      </div>
      <div class="field">
        <label>Marca <span style="color:var(--ruby-red)">*</span></label>
        <select id="marca" required onchange="handleMarcaChange()">
          <option value="">Selecione a marca</option>
        </select>
      </div>
      <div class="field" id="campoCargoWrap" style="display:none">
        <label>Cargo <span style="color:var(--ruby-red)">*</span></label>
        <input type="text" id="cargo" placeholder="Seu cargo">
      </div>
      <div class="field" id="campoCfpWrap" style="display:none">
        <label>Você possui CFP?</label>
        <div class="radio-group" style="flex-direction:row;gap:16px">
          <label class="radio-option">
            <input type="radio" name="cfp" value="sim">
            <span class="radio-custom"></span><span>Sim</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="cfp" value="nao">
            <span class="radio-custom"></span><span>Não</span>
          </label>
        </div>
      </div>

      <div style="border-top:1px solid rgba(34,27,25,.08);margin:28px 0 20px;padding-top:22px">
        <div id="submitError" class="alert-card alert-danger" style="display:none;margin-bottom:16px"></div>
        <div id="formStatusArea" style="display:none;margin-top:16px"></div>
        <div class="form-nav" style="justify-content:flex-end">
          <button class="btn btn-primary btn-submit-gold" id="btnSubmit" onclick="submitForm()">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <a href="/solicitacoes.html" class="float-home" style="bottom:78px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    <span>Menu</span>
  </a>
  <a href="/" class="float-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Início</span>
  </a>
  <a href="https://wa.me/5544991689207" target="_blank" rel="noopener" class="float-whatsapp" title="Falar com o time de Marketing">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.484 2 12.017c0 1.99.521 3.86 1.43 5.484L2 22l4.644-1.414A9.96 9.96 0 0011.999 22C17.523 22 22 17.516 22 11.983 22 6.472 17.523 2 11.999 2zm0 18.15a8.124 8.124 0 01-4.162-1.145l-.299-.178-3.088.941.923-3.121-.196-.32A8.185 8.185 0 013.85 11.983c0-4.51 3.644-8.183 8.15-8.183 4.507 0 8.152 3.672 8.152 8.183 0 4.51-3.645 8.167-8.153 8.167z"/></svg>
  </a>
  <script>
  (function() {
    function posicionarWhatsApp() {
      const wa = document.querySelector('.float-whatsapp');
      if (!wa) return;
      const outros = [...document.querySelectorAll('.float-home')].filter(el => el !== wa && getComputedStyle(el).display !== 'none');
      if (outros.length === 0) { wa.style.bottom = '78px'; } else {
        const alturas = outros.map(el => parseInt(el.style.bottom || getComputedStyle(el).bottom) || 20);
        wa.style.bottom = (Math.max(...alturas) + 58) + 'px';
      }
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', posicionarWhatsApp); } else { posicionarWhatsApp(); }
  })();
  </script>

  </div>
  <script src="utils.js"></script>
  <script src="upload-feedback.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="shell.js"></script>
  <script>
    const TIPO = 'assinatura-email';
    const MARCAS_OPTS_FORM = [
      { value: 'svn-investimentos',           label: 'SVN Investimentos' },
      { value: 'svn-capital',                 label: 'SVN Capital' },
      { value: 'svn-connect',                 label: 'SVN Connect' },
      { value: 'svn-gestao',                  label: 'SVN Gestão' },
      { value: 'svn-global',                  label: 'SVN Global' },
      { value: 'svn-imb',                     label: 'SVN Investment & Merchant Banking' },
      { value: 'svn-agro-cambio-commodities', label: 'SVN Agro, Câmbio & Commodities' },
      { value: 'svn-protecao-patrimonial',    label: 'SVN Proteção Patrimonial' },
      { value: 'svn-wealth-planning',         label: 'SVN Wealth Planning' },
    ];
    const MARCAS_CONTRATO = ['svn-investimentos', 'svn-capital', 'svn-connect'];

    async function init() {
      await _configReady;
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/form-assinatura-email.html'; return; }
      Shell.render({ activeRoute: 'nova-solicitacao', contentEl: document.getElementById('pageContent') });

      const marcaSel = document.getElementById('marca');
      if (marcaSel) { MARCAS_OPTS_FORM.forEach(m => { const o = document.createElement('option'); o.value = m.value; o.textContent = m.label; marcaSel.appendChild(o); }); }

      Auth.aplicarPerfilNoCampo('telefone', Auth.getTelefone());

      restoreSession();
    }

    function handleMarcaChange() {
      const marca = document.getElementById('marca').value;
      const isContrato = MARCAS_CONTRATO.includes(marca);
      const campoCargoWrap = document.getElementById('campoCargoWrap');
      const campoCfpWrap = document.getElementById('campoCfpWrap');
      const cargoInput = document.getElementById('cargo');
      if (campoCargoWrap) {
        campoCargoWrap.style.display = isContrato ? 'none' : (marca ? 'block' : 'none');
        if (cargoInput) cargoInput.required = !isContrato && !!marca;
      }
      if (campoCfpWrap) {
        campoCfpWrap.style.display = isContrato ? 'block' : 'none';
      }
    }

    function saveSession() {
      try {
        sessionStorage.setItem('form-assinatura-email', JSON.stringify({
          nome: document.getElementById('nomeCompleto')?.value || '',
          cargo: document.getElementById('cargo')?.value || '',
          telefone: document.getElementById('telefone')?.value || '',
          email: document.getElementById('emailCorporativo')?.value || '',
          marca: document.getElementById('marca')?.value || '',
          tem_cfp: document.querySelector('input[name="cfp"]:checked')?.value || '',
        }));
      } catch {}
    }

    function restoreSession() {
      try {
        const data = JSON.parse(sessionStorage.getItem('form-assinatura-email'));
        if (!data) return;
        if (data.nome) document.getElementById('nomeCompleto').value = data.nome;
        if (data.cargo) { const el = document.getElementById('cargo'); if (el) el.value = data.cargo; }
        if (data.telefone) document.getElementById('telefone').value = data.telefone;
        if (data.email) document.getElementById('emailCorporativo').value = data.email;
        if (data.marca) { const el = document.getElementById('marca'); if (el) { el.value = data.marca; handleMarcaChange(); } }
        if (data.tem_cfp) { const el = document.querySelector(`input[name="cfp"][value="${data.tem_cfp}"]`); if (el) el.checked = true; }
      } catch {}
    }

    function validateRequiredFields() {
      document.querySelectorAll('.field-invalid').forEach(el => el.classList.remove('field-invalid'));
      const invalidFields = [];
      document.querySelectorAll('input[required], select[required], textarea[required]').forEach(input => {
        if (input.closest('.field') && input.closest('.field').style.display === 'none') return;
        const isEmpty = !input.value.trim();
        if (isEmpty) {
          const fieldWrapper = input.closest('.field');
          if (fieldWrapper) {
            fieldWrapper.classList.add('field-invalid');
            let errorEl = fieldWrapper.querySelector('.field-error');
            if (!errorEl) { errorEl = document.createElement('div'); errorEl.className = 'field-error'; input.parentElement.appendChild(errorEl); }
            errorEl.textContent = 'Este campo é obrigatório.';
            invalidFields.push(fieldWrapper);
          }
        }
      });
      if (invalidFields.length > 0) { invalidFields[0].scrollIntoView({ behavior: 'smooth', block: 'center' }); return false; }
      return true;
    }

    async function submitForm() {
      if (!validateRequiredFields()) return;
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Enviando...'; if(window.formLockUI)window.formLockUI(btn);

      const marca = document.getElementById('marca').value;
      const isContrato = MARCAS_CONTRATO.includes(marca);

      const dados = {
        nome: document.getElementById('nomeCompleto').value,
        cargo: isContrato ? '' : (document.getElementById('cargo')?.value || ''),
        tem_cfp: isContrato ? (document.querySelector('input[name="cfp"]:checked')?.value || '') : '',
        telefone: document.getElementById('telefone').value,
        email: document.getElementById('emailCorporativo').value,
        marca: marca,
      };

      const formData = new FormData();
      formData.append('tipo_solicitacao', TIPO);
      formData.append('dados', JSON.stringify(dados));

      try {
        const res = await fetch('/api/solicitacoes', { method: 'POST', body: formData });
        const d = await res.json().catch(() => ({}));
        if (res.ok) {
          sessionStorage.removeItem('form-assinatura-email');
          try {
            sessionStorage.setItem('svn_ultimo_resumo', JSON.stringify({
              tipo_id: TIPO,
              tipo: TIPO_SOLICITACAO_LABELS[TIPO] || TIPO,
              solicitante: Auth.getUserName(),
              data: new Date().toLocaleDateString('pt-BR'),
              hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
              id: d.id,
            }));
          } catch {}
          window.location.href = '/thankyou.html';
        } else {
          throw new Error(d.error || 'submit_failed');
        }
      } catch {
        const errEl = document.getElementById('submitError');
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.'; }
        if(window.formUnlockUI)window.formUnlockUI(btn); else { btn.disabled = false; btn.textContent = 'Enviar'; }
      }
    }

    document.addEventListener('input', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid') && e.target.value.trim()) field.classList.remove('field-invalid');
      saveSession();
    });
    document.addEventListener('change', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid')) field.classList.remove('field-invalid');
      saveSession();
    });

    init();
  </script>
</body>
</html>
