<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{const s=JSON.parse(localStorage.getItem('svn_layout_state')||'{}');if(s.isAdmin)document.documentElement.dataset.preShell='admin';}catch(e){}})()</script>
  <title>Linha do Tempo — Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    .chf-wrap { max-width: 640px; margin: 0 auto; padding: 32px 24px; }
    .chf-title { font-family: 'Taviraj', serif; font-weight: 300; font-size: 1.7rem; margin: 0 0 4px; color: var(--carbon-black,#221b19); }
    .chf-sub { font-size: 0.88rem; color: rgba(34,27,25,0.55); margin: 0 0 26px; }
    .chf-field { margin-bottom: 20px; }
    .chf-label { display: block; font-size: 0.88rem; font-weight: 600; color: var(--carbon-black,#221b19); margin-bottom: 7px; }
    .chf-input { width: 100%; box-sizing: border-box; padding: 11px 13px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 0.92rem; font-family: 'Nunito Sans', sans-serif; color: #221b19; background: #fff; }
    .chf-input:focus { outline: none; border-color: #AC3631; }
    .chf-input.field-invalid { border-color: #b91c1c; }
    textarea.chf-input { min-height: 90px; resize: vertical; }
    .chf-error { color: #b91c1c; font-size: 0.78rem; margin-top: 5px; }
    .chf-submit { background: #AC3631; color: #fff; border: none; padding: 12px 26px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: 'Nunito Sans', sans-serif; margin-top: 6px; }
    .chf-submit:hover { background: #b44b42; }
    .chf-submit:disabled { opacity: 0.6; cursor: default; }
    #submitError { display: none; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; padding: 11px 14px; font-size: 0.85rem; margin-bottom: 16px; }
  </style>
</head>
<body class="page-light">
  <div id="pageContent">
    <div class="chf-wrap">
      <h1 class="chf-title">Linha do Tempo</h1>
      <p class="chf-sub">Solicite a arte da linha do tempo (tempo de casa dos colaboradores).</p>
      <div id="submitError"></div>

      <div class="chf-field">
        <label class="chf-label" for="mes">Mês de referência *</label>
        <select class="chf-input" id="mes" required></select>
        <div class="chf-error" style="display:none"></div>
      </div>

      <div class="chf-field">
        <label class="chf-label" for="arquivo">Faça o upload do arquivo que consta o tempo de casa dos colaboradores. *</label>
        <input class="chf-input" type="file" id="arquivo" required>
        <div class="chf-error" style="display:none"></div>
      </div>

      <div class="chf-field">
        <label class="chf-label" for="observacoes">Deixe aqui suas observações finais (opcional)</label>
        <textarea class="chf-input" id="observacoes" placeholder="Observações…"></textarea>
      </div>

      <button class="chf-submit" id="btnSubmit" onclick="submitForm()">Enviar</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="shell.js"></script>
  <script>
    const TIPO = 'ch-linha-do-tempo';
    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    async function init() {
      try { if (typeof _configReady !== 'undefined') await _configReady; } catch (e) {}
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/form-ch-linha-do-tempo.html'; return; }
      const role = Auth.getUserRole();
      if (role !== 'capital_humano' && role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      if (typeof Shell !== 'undefined' && Shell.render) {
        Shell.render({ activeRoute: 'capital-humano', contentEl: document.getElementById('pageContent') });
      }
      const sel = document.getElementById('mes');
      const prox = (new Date().getMonth() + 1) % 12;
      MESES.forEach(function (m, i) {
        const o = document.createElement('option'); o.value = m; o.textContent = m;
        if (i === prox) o.selected = true;
        sel.appendChild(o);
      });
    }

    function validateRequiredFields() {
      let ok = true;
      document.querySelectorAll('.chf-input.field-invalid').forEach(function (el) { el.classList.remove('field-invalid'); });
      document.querySelectorAll('[required]').forEach(function (input) {
        const err = input.parentElement.querySelector('.chf-error');
        const empty = input.type === 'file' ? !input.files.length : !input.value.trim();
        if (empty) {
          ok = false; input.classList.add('field-invalid');
          if (err) { err.textContent = 'Campo obrigatório.'; err.style.display = 'block'; }
        } else if (err) { err.style.display = 'none'; }
      });
      return ok;
    }

    async function submitForm() {
      if (!validateRequiredFields()) return;
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Enviando...'; if (window.formLockUI) window.formLockUI(btn);

      const dados = {
        nome: Auth.getUserName(),
        mes: document.getElementById('mes').value,
        observacoes: document.getElementById('observacoes').value,
      };

      const formData = new FormData();
      formData.append('tipo_solicitacao', TIPO);
      formData.append('dados', JSON.stringify(dados));
      const arq = document.getElementById('arquivo').files[0];
      if (arq) formData.append('arquivoApoio', arq);

      try {
        const res = await fetch('/api/solicitacoes', { method: 'POST', body: formData });
        const d = await res.json().catch(function () { return {}; });
        if (res.ok) {
          try {
            sessionStorage.setItem('svn_ultimo_resumo', JSON.stringify({
              tipo: 'Linha do Tempo - ' + dados.mes, solicitante: Auth.getUserName(),
              data: new Date().toLocaleDateString('pt-BR'),
              hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
              id: d.id,
            }));
          } catch (e) {}
          window.location.replace('/thankyou.html');
        } else {
          const errEl = document.getElementById('submitError');
          errEl.style.display = 'block'; errEl.textContent = d.error || 'Erro ao enviar. Tente novamente.';
          if (window.formUnlockUI) window.formUnlockUI(btn); else { btn.disabled = false; btn.textContent = 'Enviar'; }
        }
      } catch (err) {
        const errEl = document.getElementById('submitError');
        errEl.style.display = 'block'; errEl.textContent = 'Erro de rede. Tente novamente.';
        if (window.formUnlockUI) window.formUnlockUI(btn); else { btn.disabled = false; btn.textContent = 'Enviar'; }
      }
    }

    init();
  </script>
</body>
</html>
