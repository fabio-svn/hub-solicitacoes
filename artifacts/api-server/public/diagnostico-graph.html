<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico Microsoft Graph — SVN</title>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
    header { background: #1a1a1a; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; opacity: 0.5; }
    .container { max-width: 860px; margin: 40px auto; padding: 0 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 32px; margin-bottom: 24px; }
    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: #444; text-transform: uppercase; letter-spacing: .05em; }
    .field-row { display: grid; grid-template-columns: 220px 1fr; gap: 8px 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .field-row:last-child { border-bottom: none; }
    .field-label { font-size: 0.78rem; color: #888; font-weight: 600; }
    .field-value { font-size: 0.9rem; word-break: break-all; }
    .field-value.empty { color: #ccc; font-style: italic; }
    .field-value.has-value { color: #1a1a1a; font-weight: 500; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.72rem; font-weight: 700; }
    .badge-ok { background: #e6f9f0; color: #0a7a45; }
    .badge-empty { background: #f5f5f5; color: #aaa; }
    .badge-error { background: #fff0f0; color: #c0392b; }
    .raw-toggle { margin-top: 16px; }
    .raw-toggle button { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; color: #666; }
    .raw-toggle button:hover { background: #f5f5f5; }
    pre { background: #1a1a1a; color: #e0e0e0; border-radius: 8px; padding: 20px; font-size: 0.78rem; overflow-x: auto; margin-top: 12px; line-height: 1.6; display: none; }
    pre.visible { display: block; }
    .loading { text-align: center; padding: 60px; color: #aaa; font-size: 0.9rem; }
    .error-box { background: #fff0f0; border: 1px solid #f5c6c6; border-radius: 8px; padding: 20px; color: #c0392b; }
    .summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .summary-item { flex: 1; min-width: 160px; background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .summary-item .num { font-size: 2rem; font-weight: 800; line-height: 1; }
    .summary-item .lbl { font-size: 0.72rem; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .num-ok { color: #0a7a45; }
    .num-empty { color: #ccc; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Diagnóstico — Perfil Microsoft Graph</h1>
    <span>Verifica quais dados a Microsoft possui para o seu usuário</span>
  </div>
</header>

<div class="container">
  <div id="content" class="loading">Carregando dados do perfil…</div>
</div>

<script>
const FIELDS_INTERESSE = [
  { key: 'displayName',                label: 'Nome completo' },
  { key: 'mail',                       label: 'E-mail' },
  { key: 'userPrincipalName',          label: 'UPN (login)' },
  { key: 'mobilePhone',                label: 'Telefone celular' },
  { key: 'businessPhones',             label: 'Telefones corporativos' },
  { key: 'officeLocation',             label: 'Localização / Escritório' },
  { key: 'jobTitle',                   label: 'Cargo' },
  { key: 'department',                 label: 'Departamento' },
  { key: 'companyName',                label: 'Empresa' },
  { key: 'employeeId',                 label: 'ID do funcionário' },
  { key: 'city',                       label: 'Cidade' },
  { key: 'state',                      label: 'Estado' },
  { key: 'country',                    label: 'País' },
  { key: 'streetAddress',              label: 'Endereço' },
  { key: 'postalCode',                 label: 'CEP' },
  { key: 'onPremisesSamAccountName',   label: 'SAM Account (AD)' },
  { key: 'onPremisesUserPrincipalName',label: 'UPN On-Premises (AD)' },
  { key: 'onPremisesExtensionAttributes', label: 'Atributos de extensão (AD)' },
];

function formatValue(val) {
  if (val === null || val === undefined || val === '') return null;
  if (Array.isArray(val)) {
    if (val.length === 0) return null;
    return val.join(', ');
  }
  if (typeof val === 'object') {
    const entries = Object.entries(val).filter(([, v]) => v !== null && v !== '');
    if (entries.length === 0) return null;
    return entries.map(([k, v]) => `${k}: ${v}`).join('\n');
  }
  return String(val);
}

async function load() {
  const res = await fetch('/auth/me-graph', { credentials: 'include' });
  if (res.status === 401) {
    window.location.href = '/auth/login?redirect=/diagnostico-graph.html';
    return;
  }
  const data = await res.json();

  if (!res.ok) {
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        <strong>Erro:</strong> ${data.error || 'Falha desconhecida'}<br>
        ${data.detail ? `<pre style="margin-top:8px;background:none;color:inherit;padding:0">${JSON.stringify(data.detail, null, 2)}</pre>` : ''}
      </div>`;
    return;
  }

  const p = data.graphProfile;
  let preenchidos = 0;
  let vazios = 0;

  const rows = FIELDS_INTERESSE.map(f => {
    const raw = p[f.key];
    const formatted = formatValue(raw);
    if (formatted) preenchidos++; else vazios++;
    const badge = formatted
      ? `<span class="badge badge-ok">preenchido</span>`
      : `<span class="badge badge-empty">vazio</span>`;
    const valHtml = formatted
      ? `<span class="field-value has-value">${formatted.replace(/\n/g, '<br>')}</span>`
      : `<span class="field-value empty">não informado</span>`;
    return `<div class="field-row"><span class="field-label">${f.label}</span><span>${valHtml} ${badge}</span></div>`;
  }).join('');

  const extAttr = p.onPremisesExtensionAttributes;
  let extRows = '';
  if (extAttr && typeof extAttr === 'object') {
    const filled = Object.entries(extAttr).filter(([, v]) => v !== null && v !== '');
    if (filled.length > 0) {
      extRows = `<div class="card"><h2>Atributos de Extensão do Active Directory (preenchidos)</h2>${
        filled.map(([k, v]) => `<div class="field-row"><span class="field-label">${k}</span><span class="field-value has-value">${v}</span></div>`).join('')
      }</div>`;
    }
  }

  document.getElementById('content').innerHTML = `
    <div class="summary">
      <div class="summary-item"><div class="num num-ok">${preenchidos}</div><div class="lbl">campos preenchidos</div></div>
      <div class="summary-item"><div class="num num-empty">${vazios}</div><div class="lbl">campos vazios</div></div>
    </div>
    <div class="card">
      <h2>Perfil Microsoft Graph — ${p.displayName || data.sessionUser.name}</h2>
      ${rows}
    </div>
    ${extRows}
    <div class="card raw-toggle">
      <h2>JSON completo</h2>
      <button onclick="toggleRaw()">Mostrar / Esconder JSON bruto</button>
      <pre id="rawJson">${JSON.stringify(data, null, 2)}</pre>
    </div>`;
}

function toggleRaw() {
  document.getElementById('rawJson').classList.toggle('visible');
}

load().catch(err => {
  document.getElementById('content').innerHTML = `<div class="error-box"><strong>Erro inesperado:</strong> ${err.message}</div>`;
});
</script>
</body>
</html>
