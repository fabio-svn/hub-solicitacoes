<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{const s=JSON.parse(localStorage.getItem('svn_layout_state')||'{}');if(s.isAdmin)document.documentElement.dataset.preShell='admin';}catch(e){}})()</script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus dados — Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-light">
  <div id="pageContent">
    <div class="page-container page-container--standard">
      <div class="page-header"><h1 class="page-title">Meus dados</h1></div>

      <div class="card" style="margin-top:20px;padding:22px">
        <p style="margin:0 0 16px;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ruby-red)">Conta</p>
        <div id="mdConta" class="md-grid"></div>
      </div>

      <div class="card" style="margin-top:16px;padding:22px">
        <p style="margin:0 0 6px;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ruby-red)">Contato e unidade</p>
        <p style="margin:0 0 18px;font-size:0.85rem;line-height:1.5;color:var(--ink-60)">
          Vem do cadastro corporativo. O Hub apenas lê estes dados — não altera.</p>
        <div id="mdPerfil" class="md-grid"></div>
        <div id="mdSemPerfil" style="display:none;font-size:0.88rem;color:var(--ink-60)">
          Não encontramos seu cadastro no sistema corporativo. Os formulários vão pedir esses dados manualmente.
        </div>
      </div>
    </div>
  </div>

  <style>
    .md-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px 28px }
    .md-item p { margin:0 }
    .md-label { font-size:0.68rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--ink-50); margin-bottom:4px }
    .md-valor { font-size:0.95rem; line-height:1.4; color:var(--carbon-black); word-break:break-word }
    .md-vazio { color:var(--ink-30); font-style:italic }
  </style>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="shell.js"></script>
  <script src="utils.js"></script>
  <script src="toast.js"></script>
  <script src="icons.js"></script>
  <script>
    const ROLE_LABEL = {
      admin: 'Administrador', gestor: 'Gestor',
      capital_humano: 'Capital Humano', colaborador: 'Colaborador',
    };

    /* O campo telefone do cadastro as vezes ja traz o DDD dentro, as vezes nao —
       por isso o numero saia como "(44) (44) 99999-8888". Aqui tudo vira digito,
       o DDD repetido cai fora e a formatacao acontece uma vez so. */
    function formatarTelefone(ddd, telefone) {
      var d = String(ddd || '').replace(/\D/g, '');
      var t = String(telefone || '').replace(/\D/g, '');
      if (!t) return '';
      // telefone ja comeca com o proprio DDD: nao prefixa de novo
      if (d && t.indexOf(d) === 0 && t.length > d.length) t = t.slice(d.length);
      var full = d ? d + t : t;
      if (full.length === 11) return '(' + full.slice(0,2) + ') ' + full.slice(2,7) + '-' + full.slice(7);
      if (full.length === 10) return '(' + full.slice(0,2) + ') ' + full.slice(2,6) + '-' + full.slice(6);
      // formato fora do padrao: devolve o que veio, sem inventar recorte
      return String(telefone || '').trim();
    }

    function item(label, valor) {
      const vazio = valor === null || valor === undefined || String(valor).trim() === '';
      return '<div class="md-item"><p class="md-label">' + window.esc(label) + '</p>'
           + '<p class="md-valor' + (vazio ? ' md-vazio' : '') + '">'
           + (vazio ? 'não informado' : window.esc(String(valor))) + '</p></div>';
    }

    (async function () {
      await Auth.init();
      Shell.render({ activeRoute: 'meus-dados', contentEl: document.getElementById('pageContent') });

      // O Auth expoe campos avulsos, nao um objeto de usuario — nao existe getUser().
      document.getElementById('mdConta').innerHTML =
        item('Nome', Auth.getUserName()) +
        item('E-mail', Auth.getUserEmail()) +
        item('Perfil', ROLE_LABEL[Auth.getUserRole()] || Auth.getUserRole());

      // Helpers prontos do Auth, em vez de ler getProfile() na mao.
      if (!Auth.perfilEncontrado()) {
        document.getElementById('mdPerfil').style.display = 'none';
        document.getElementById('mdSemPerfil').style.display = '';
      } else {
        var p = Auth.getProfile() || {};
          var tel = formatarTelefone(p.ddd, Auth.getTelefone());
        document.getElementById('mdPerfil').innerHTML =
          item('Cargo', Auth.getCargo()) +
          item('Unidade', Auth.getUnidade()) +
          item('Escritório', Auth.getEscritorio()) +
          item('Telefone', tel) +
          item('Código Ancord', Auth.getCdAncord());
      }
    })();
  </script>
</body>
</html>
