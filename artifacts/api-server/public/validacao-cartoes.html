<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{const s=JSON.parse(localStorage.getItem('svn_layout_state')||'{}');if(s.isAdmin)document.documentElement.dataset.preShell='admin';}catch(e){}})()</script>
  <title>Validação de Cartões — Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    .vc-wrap { max-width: 1480px; margin: 0 auto; padding: 32px 24px; }
    .vc-title { font-family: 'Taviraj', serif; font-weight: 300; margin: 0 0 4px; font-size: 1.8rem; color: var(--carbon-black,#221b19); }
    .vc-sub { font-size: 0.9rem; color: rgba(34,27,25,0.5); margin: 0 0 24px; }
    .vc-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .vc-search { flex: 1 1 240px; max-width: 320px; padding: 9px 12px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 0.88rem; font-family: inherit; color: #221b19; }
    .vc-search:focus { outline: none; border-color: #AC3631; }
    .vc-filter { padding: 9px 12px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 0.88rem; font-family: inherit; color: #221b19; background: #fff; cursor: pointer; }
    .vc-filter:focus { outline: none; border-color: #AC3631; }
    .vc-count { font-size: 0.85rem; color: rgba(34,27,25,0.5); margin-left: auto; }
    .vc-saved { font-size: 0.78rem; color: #15803d; opacity: 0; transition: opacity .2s; }
    .vc-saved.show { opacity: 1; }

    .vc-scroll { overflow: auto; max-height: 70vh; border: 1px solid #e8edf2; border-radius: 12px; }
    table.vc { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1240px; font-size: 0.82rem; }
    table.vc th { position: sticky; top: 0; z-index: 2; font-weight: 700; padding: 10px 12px; text-align: center; white-space: nowrap; box-shadow: inset 0 -1px 0 rgba(0,0,0,.08); user-select: none; }
    table.vc th.form { background: #d6e8df; color: #2f4a3f; }
    table.vc th.mng { background: #f1ded9; color: #8a3f37; }
    table.vc th.ver { background: #f3efec; color: #6b6b6b; }
    table.vc th.sortable { cursor: pointer; }
    table.vc th.sortable:hover { filter: brightness(0.97); }
    table.vc th .sort-ind { font-size: 0.7rem; margin-left: 5px; opacity: 0.85; }
    table.vc td { border-bottom: 1px solid #eef1f4; border-right: 1px solid #f1f4f7; padding: 3px 4px; text-align: center; vertical-align: middle; background: #fff; }
    table.vc tr:nth-child(even) td { background: #fcfcfb; }
    table.vc tr.flash td { background: #ecfdf3 !important; transition: background .2s; }
    table.vc input, table.vc select, table.vc textarea { width: 100%; box-sizing: border-box; border: 1px solid transparent; background: transparent; font: inherit; text-align: center; padding: 6px; border-radius: 6px; color: #221b19; }
    table.vc select { cursor: pointer; -webkit-appearance: none; appearance: none; font-weight: 600; }
    table.vc textarea { text-align: left; resize: vertical; min-height: 34px; line-height: 1.3; }
    table.vc input:focus, table.vc select:focus, table.vc textarea:focus { outline: none; border-color: #AC3631; background: #fff; text-align: left; }
    table.vc input:hover, table.vc select:hover, table.vc textarea:hover { border-color: #eef1f4; }
    td.col-observacao { min-width: 200px; }
    td.col-ver { width: 46px; }
    .vc-verlink { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 7px; background: rgba(37,99,235,0.08); color: #2563eb; text-decoration: none; transition: all .15s; }
    .vc-verlink:hover { background: rgba(37,99,235,0.18); transform: scale(1.08); }
    .vc-empty { padding: 30px; text-align: center; color: rgba(34,27,25,0.5); font-size: 0.88rem; }
  </style>
</head>
<body class="page-light">
  <div id="pageContent">
    <div class="vc-wrap">
      <h1 class="vc-title">Validação de Cartões de Visita</h1>
      <p class="vc-sub">Validação dos cartões físicos. As alterações são salvas automaticamente.</p>

      <div class="vc-toolbar">
        <input class="vc-search" id="vcSearch" type="text" placeholder="Buscar por nome, e-mail, unidade…">
        <select class="vc-filter" id="vcFilterStatus">
          <option value="">Todos os andamentos</option>
        </select>
        <span class="vc-saved" id="vcSaved">✓ Salvo</span>
        <span class="vc-count" id="vcCount"></span>
      </div>

      <div id="vcContent"><div class="vc-empty">Carregando…</div></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="shell.js"></script>
  <script>
    const CONTRATO_OPTS = [
      { v: '', label: 'Selecione…' },
      { v: 'svn-capital', label: 'SVN Capital' },
      { v: 'svn-connect', label: 'SVN Connect' },
      { v: 'svn-investimentos', label: 'SVN Investimentos' },
    ];
    const CUSTO_OPTS = [
      { v: '', label: 'Selecione…' },
      { v: 'interno', label: 'Interno' },
      { v: 'colaborador', label: 'Colaborador' },
    ];
    const CUSTO_COLORS = {
      interno: { bg: '#fef9c3', text: '#a16207' },
      colaborador: { bg: '#ccfbf1', text: '#0f766e' },
    };
    const STATUS_OPTS = [
      { v: 'aguardando-validacao', label: 'Aguardando validação' },
      { v: 'aguardando-contrato', label: 'Aguardando contrato' },
      { v: 'liberado-design', label: 'Liberado para Design' },
      { v: 'arte-finalizada', label: 'Arte finalizada' },
      { v: 'envio-grafica', label: 'Envio gráfica' },
      { v: 'envio-assessor', label: 'Envio assessor' },
    ];
    const STATUS_COLORS = {
      'aguardando-validacao': { bg: '#fee2e2', text: '#b91c1c' },
      'aguardando-contrato': { bg: '#f1f5f9', text: '#475569' },
      'liberado-design': { bg: '#ede9fe', text: '#6d28d9' },
      'arte-finalizada': { bg: '#fef9c3', text: '#a16207' },
      'envio-grafica': { bg: '#dbeafe', text: '#1d4ed8' },
      'envio-assessor': { bg: '#dcfce7', text: '#15803d' },
    };
    const COLS = [
      { f: 'data_pedido', label: 'Data do pedido', group: 'form', type: 'input' },
      { f: 'nome', label: 'Nome', group: 'form', type: 'input' },
      { f: 'whatsapp', label: 'WhatsApp', group: 'form', type: 'input' },
      { f: 'email', label: 'E-Mail', group: 'form', type: 'input' },
      { f: 'unidade', label: 'Unidade', group: 'form', type: 'input' },
      { f: 'contrato_social', label: 'Contrato Social', group: 'mng', type: 'select', opts: CONTRATO_OPTS },
      { f: 'envio_para', label: 'Envio para', group: 'mng', type: 'input' },
      { f: 'custo', label: 'Custo', group: 'mng', type: 'select', opts: CUSTO_OPTS, colors: CUSTO_COLORS },
      { f: 'status', label: 'Andamento', group: 'mng', type: 'select', opts: STATUS_OPTS, colors: STATUS_COLORS },
      { f: 'observacao', label: 'Observação', group: 'mng', type: 'textarea' },
    ];

    let RAW = [];
    let sortState = { field: null, dir: 1 };

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }
    function optionsHtml(opts, sel) { return opts.map(function (o) { return '<option value="' + esc(o.v) + '"' + (o.v === sel ? ' selected' : '') + '>' + esc(o.label) + '</option>'; }).join(''); }
    function colorSelect(el, map) { const c = map && map[el.value]; if (c) { el.style.background = c.bg; el.style.color = c.text; } else { el.style.background = 'transparent'; el.style.color = '#221b19'; } }

    async function init() {
      try { if (typeof _configReady !== 'undefined') await _configReady; } catch (e) {}
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/validacao-cartoes.html'; return; }
      const role = Auth.getUserRole();
      if (role !== 'capital_humano' && role !== 'gestor' && role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      if (typeof Shell !== 'undefined' && Shell.render) {
        Shell.render({ activeRoute: 'validacao-cartoes', contentEl: document.getElementById('pageContent') });
      }
      const fs = document.getElementById('vcFilterStatus');
      STATUS_OPTS.forEach(function (o) { const op = document.createElement('option'); op.value = o.v; op.textContent = o.label; fs.appendChild(op); });
      fs.addEventListener('change', render);
      document.getElementById('vcSearch').addEventListener('input', render);
      carregar();
    }

    async function carregar() {
      try {
        const res = await fetch('/api/cartao-aprovacoes');
        const d = await res.json();
        RAW = (d && d.linhas) || [];
        render();
      } catch (e) {
        document.getElementById('vcContent').innerHTML = '<div class="vc-empty">Erro ao carregar. Recarregue a página.</div>';
      }
    }

    function getView() {
      const termo = (document.getElementById('vcSearch').value || '').trim().toLowerCase();
      const fStatus = document.getElementById('vcFilterStatus').value;
      let view = RAW.slice();
      if (fStatus) view = view.filter(function (l) { return l.status === fStatus; });
      if (termo) {
        view = view.filter(function (l) {
          return ['nome', 'email', 'unidade', 'whatsapp', 'envio_para', 'observacao'].some(function (k) {
            return String(l[k] || '').toLowerCase().indexOf(termo) !== -1;
          });
        });
      }
      if (sortState.field) {
        view.sort(function (a, b) {
          const av = String(a[sortState.field] || ''); const bv = String(b[sortState.field] || '');
          return av.localeCompare(bv, 'pt-BR', { numeric: true, sensitivity: 'base' }) * sortState.dir;
        });
      }
      return view;
    }

    function render() {
      const view = getView();
      document.getElementById('vcCount').textContent = view.length + (view.length === 1 ? ' cartão' : ' cartões');
      if (!RAW.length) { document.getElementById('vcContent').innerHTML = '<div class="vc-empty">Nenhuma solicitação de cartão físico ainda.</div>'; return; }

      const head = '<tr>' + COLS.map(function (c) {
        const ind = sortState.field === c.f ? (sortState.dir === 1 ? '▲' : '▼') : '';
        return '<th class="' + c.group + ' sortable" data-sort="' + c.f + '">' + esc(c.label) + '<span class="sort-ind">' + ind + '</span></th>';
      }).join('') + '<th class="ver">Ver</th></tr>';

      const rows = view.map(function (l) {
        const tds = COLS.map(function (c) {
          const val = l[c.f];
          if (c.type === 'select') return '<td><select data-f="' + c.f + '">' + optionsHtml(c.opts, val) + '</select></td>';
          if (c.type === 'textarea') return '<td class="col-observacao"><textarea data-f="' + c.f + '" rows="1" placeholder="—">' + esc(val) + '</textarea></td>';
          return '<td><input data-f="' + c.f + '" value="' + esc(val) + '"' + (c.f === 'envio_para' ? ' placeholder="—"' : '') + '></td>';
        }).join('');
        const ver = '<td class="col-ver"><a class="vc-verlink" href="/solicitacao.html?id=' + l.solicitacao_id + '" target="_blank" title="Abrir solicitação"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></td>';
        return '<tr data-id="' + l.solicitacao_id + '">' + tds + ver + '</tr>';
      }).join('');

      document.getElementById('vcContent').innerHTML = '<div class="vc-scroll"><table class="vc"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table></div>';

      document.querySelectorAll('table.vc th.sortable').forEach(function (th) {
        th.addEventListener('click', function () {
          const f = th.getAttribute('data-sort');
          if (sortState.field === f) sortState.dir *= -1; else { sortState.field = f; sortState.dir = 1; }
          render();
        });
      });

      document.querySelectorAll('table.vc tbody tr').forEach(function (tr) {
        tr.querySelectorAll('select[data-f]').forEach(function (sel) {
          const col = COLS.find(function (c) { return c.f === sel.getAttribute('data-f'); });
          if (col && col.colors) { colorSelect(sel, col.colors); sel.addEventListener('change', function () { colorSelect(sel, col.colors); }); }
        });
        tr.querySelectorAll('textarea[data-f]').forEach(function (ta) {
          autoGrow(ta); ta.addEventListener('input', function () { autoGrow(ta); });
        });
        tr.querySelectorAll('[data-f]').forEach(function (el) {
          el.addEventListener('change', function () { salvarLinha(tr); });
        });
      });
    }

    function autoGrow(ta) { ta.style.height = 'auto'; ta.style.height = Math.max(34, ta.scrollHeight) + 'px'; }

    let saveTimer = null;
    async function salvarLinha(tr) {
      const id = parseInt(tr.getAttribute('data-id'), 10);
      const payload = {};
      tr.querySelectorAll('[data-f]').forEach(function (el) { payload[el.getAttribute('data-f')] = el.value; });
      const rawItem = RAW.find(function (r) { return r.solicitacao_id === id; });
      if (rawItem) Object.keys(payload).forEach(function (k) { rawItem[k] = payload[k]; });
      try {
        const res = await fetch('/api/cartao-aprovacoes/' + id, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });
        if (res.ok) {
          tr.classList.add('flash'); setTimeout(function () { tr.classList.remove('flash'); }, 600);
          const tag = document.getElementById('vcSaved'); tag.classList.add('show');
          clearTimeout(saveTimer); saveTimer = setTimeout(function () { tag.classList.remove('show'); }, 1500);
        }
      } catch (e) {}
    }

    init();
  </script>
</body>
</html>
