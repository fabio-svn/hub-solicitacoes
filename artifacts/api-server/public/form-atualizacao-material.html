<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atualização de Material - Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-light">
  <header class="header" id="mainHeader"></header>
  <div class="container-narrow" style="padding-top:32px;padding-bottom:80px">
    <div class="form-card">
      <div class="form-progress"><div class="form-progress-bar" id="progressBar" style="width:100%"></div></div>

      <div class="form-step active" id="step1">
        <h2 style="font-weight:600;font-size:1.1rem;margin-bottom:20px">Informações do material</h2>
        <div class="field">
          <label>Material atual + arquivos de apoio</label>
          <div class="file-input-wrapper">
            <label class="file-input-btn" for="materialAtual">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Escolher arquivo
            </label>
            <input type="file" id="materialAtual">
            <div class="file-name" id="materialAtualName"></div>
          </div>
          <div class="field-hint">Enviar o material original agiliza o processo e garante que as atualizações sejam aplicadas corretamente.</div>
        </div>
        <div class="field">
          <label>Título do material</label>
          <input type="text" id="titulo" placeholder="Nome ou identificação do material que será atualizado" required>
        </div>
        <div class="field">
          <label>Finalidade do material</label>
          <textarea id="finalidade" placeholder="Para que é utilizado este material?" required></textarea>
        </div>
        <div class="field">
          <label>Descrição do que precisa ser atualizado</label>
          <textarea id="descricao" placeholder="Descreva com clareza o que deve ser alterado, corrigido ou adicionado. Quanto mais detalhado, melhor." required></textarea>
        </div>
        <div style="border-top:1px solid rgba(34,27,25,.08);margin:28px 0 20px;padding-top:22px">
          <div id="submitError" class="alert-card alert-danger" style="display:none;margin-bottom:16px"></div>
          <div class="form-nav" style="justify-content:flex-end">
            <button class="btn btn-primary btn-submit-gold" id="btnSubmit" onclick="submitForm()">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a href="/solicitacoes.html" class="float-home" style="bottom:78px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    <span>Menu</span>
  </a>
  <a href="/" class="float-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Início</span>
  </a>

  <script src="upload-feedback.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    async function init() {
      await _configReady;
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/form-atualizacao-material.html'; return; }
      Auth.renderHeader(document.getElementById('mainHeader'));

      FileUpload.bind('materialAtual', 'materialAtualName');
    }

    function validateRequiredFields() {
      document.querySelectorAll('.field-invalid').forEach(el => el.classList.remove('field-invalid'));
      const invalidFields = [];
      document.querySelectorAll('input[required], select[required], textarea[required]').forEach(input => {
        const step = input.closest('.form-step');
        if (step && !step.classList.contains('active')) return;
        const isEmpty = input.type === 'radio' || input.type === 'checkbox'
          ? !document.querySelector(`input[name="${input.name}"]:checked`)
          : !input.value.trim();
        if (isEmpty) {
          const fieldWrapper = input.closest('.field');
          if (fieldWrapper) {
            fieldWrapper.classList.add('field-invalid');
            let errorEl = fieldWrapper.querySelector('.field-error');
            if (!errorEl) {
              errorEl = document.createElement('div');
              errorEl.className = 'field-error';
              input.parentElement.appendChild(errorEl);
            }
            errorEl.textContent = 'Este campo é obrigatório.';
            invalidFields.push(fieldWrapper);
          }
        }
      });
      if (invalidFields.length > 0) {
        invalidFields[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
      }
      return true;
    }

    async function submitForm() {
      if (!validateRequiredFields()) return;
      if (!document.getElementById('materialAtual').files[0]) {
        const fieldEl = document.getElementById('materialAtual').closest('.field');
        if (fieldEl) {
          fieldEl.classList.add('field-invalid');
          let errorEl = fieldEl.querySelector('.field-error');
          if (!errorEl) {
            errorEl = document.createElement('div');
            errorEl.className = 'field-error';
            fieldEl.appendChild(errorEl);
          }
          errorEl.textContent = 'Envie o material atual para continuar.';
          fieldEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Enviando...';

      const formData = new FormData();
      formData.append('tipo_solicitacao', 'atualizacao-material');
      const dados = {
        nome: Auth.getUserName(),
        setor: '',
        titulo: document.getElementById('titulo').value,
        finalidade: document.getElementById('finalidade').value,
        descricao: document.getElementById('descricao').value,
      };
      formData.append('dados', JSON.stringify(dados));
      formData.append('materialAtual', document.getElementById('materialAtual').files[0]);

      try {
        const res = await fetch('/api/solicitacoes', { method: 'POST', body: formData });
        if (res.ok) {
          sessionStorage.removeItem('form-atualizacao');
          try {
            const resumo = {
              tipo: TIPO_SOLICITACAO_LABELS[formData.get('tipo_solicitacao')] || formData.get('tipo_solicitacao'),
              subtipo: '',
              titulo: dados.titulo || '',
              solicitante: dados.nome,
              data: new Date().toLocaleDateString('pt-BR'),
              hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
            };
            sessionStorage.setItem('svn_ultimo_resumo', JSON.stringify(resumo));
          } catch {}
          window.location.href = '/thankyou.html';
        }
        else {
          const errEl = document.getElementById('submitError');
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Erro ao enviar. Tente novamente.'; }
          btn.disabled = false; btn.textContent = 'Enviar';
        }
      } catch (e) {
        const errEl = document.getElementById('submitError');
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.'; }
        btn.disabled = false; btn.textContent = 'Enviar';
      }
    }

    function saveDraft() {
      try {
        sessionStorage.setItem('form-atualizacao', JSON.stringify({
          titulo:    document.getElementById('titulo')?.value    || '',
          finalidade: document.getElementById('finalidade')?.value || '',
          descricao: document.getElementById('descricao')?.value || '',
        }));
      } catch {}
    }
    function restoreDraft() {
      try {
        const raw = sessionStorage.getItem('form-atualizacao');
        if (!raw) return;
        const d = JSON.parse(raw);
        for (const [k, v] of Object.entries(d)) {
          const el = document.getElementById(k);
          if (el) el.value = v;
        }
      } catch {}
    }
    document.querySelectorAll('input,textarea,select').forEach(el => el.addEventListener('change', saveDraft));
    restoreDraft();

    document.addEventListener('input', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid') && e.target.value.trim()) {
        field.classList.remove('field-invalid');
      }
    });
    document.addEventListener('change', function(e) {
      const field = e.target.closest('.field');
      if (field && field.classList.contains('field-invalid')) {
        field.classList.remove('field-invalid');
      }
    });

    init();
  </script>
</body>
</html>
