<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="theme-color" content="#AC3631" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{const s=JSON.parse(localStorage.getItem('svn_layout_state')||'{}');if(s.isAdmin)document.documentElement.dataset.preShell='admin';}catch(e){}})()</script>
  <title>Validação de Assessores — Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap">
  <link rel="stylesheet" href="style.css?v=20260615c">
  <style>
    .page-container--wide { max-width: min(1400px, 96vw); }
    .va-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 16px; border-bottom: 1px solid var(--border-light); }
    .va-tab { cursor: pointer; padding: 9px 16px; border: none; background: none; font-size: 0.9rem; color: var(--ink-60); border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 8px; }
    .va-tab.active { color: var(--carbon-black); border-bottom-color: var(--ruby-red); font-weight: 600; }
    .va-tab .cnt { font-size: 0.72rem; background: var(--icon-bg); border-radius: var(--radius-pill); padding: 1px 8px; color: var(--ink-60); }
    .va-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0 0 14px; }
    .va-toolbar .search-bar { flex: 1 1 300px; min-width: 220px; margin-bottom: 0; }
    .btn.has-filters { border-color: var(--ruby-red); color: var(--ruby-red); }
    .va-count { font-size: 0.82rem; color: var(--ink-50); margin-left: auto; }
    .va-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .va-card { border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 14px; background: var(--card-white, #fff); cursor: pointer; display: flex; gap: 12px; align-items: center; transition: box-shadow .14s, border-color .14s; }
    .va-card:hover { box-shadow: 0 2px 10px rgba(34,27,25,.08); border-color: #d8d0c5; }
    .va-thumb { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; object-position: top; background: var(--icon-bg); flex-shrink: 0; }
    .va-card .nm { font-weight: 600; font-size: 0.92rem; }
    .va-card .sub { font-size: 0.76rem; color: var(--ink-60); }
    .va-badge { font-size: 0.68rem; font-weight: 600; padding: 3px 9px; border-radius: var(--radius-pill); white-space: nowrap; }
    .va-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  </style>
</head>
<body class="page-light">
  <div class="page-container page-container--wide" id="pageRoot" style="display:none">
    <div class="page-header">
      <div>
        <h1 class="page-title">Validação de Assessores</h1>
        <p class="page-subtitle">Cadastros e atualizações de perfis de assessores.</p>
      </div>
    </div>

    <div class="va-tabs" id="vaTabs"></div>

    <div class="va-funil" id="vaFunil"></div>

    <div class="va-toolbar">
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ink-40,#9c978e)" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="search" id="vaSearch" placeholder="Buscar por nome ou código…" oninput="setBusca(this.value)">
      </div>
      <div style="position:relative">
        <button class="btn" id="vaFilterToggle" onclick="toggleFilterPanel(event)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-flex"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
          Filtros <span class="filter-count-badge" id="vaFilterBadge" style="display:none">1</span>
        </button>
        <div class="filter-panel" id="vaFilterPanel">
          <div class="filter-panel-row">
            <span class="filter-panel-label">Contrato Social</span>
            <div class="filter-panel-chips" id="vaContratoChips"></div>
          </div>
          <div class="filter-panel-row">
            <span class="filter-panel-label">Unidade</span>
            <div class="filter-panel-chips" id="vaUnidadeChips"></div>
          </div>
          <div class="filter-panel-row" style="justify-content:flex-end;border-top:1px solid var(--border-light);padding-top:10px;margin-top:4px">
            <button class="filter-clear-btn" id="vaFilterClear" style="display:none" onclick="limparFiltros()">Limpar filtros</button>
          </div>
        </div>
      </div>
      <span class="va-count" id="vaCount"></span>
    </div>

    <div class="va-grid" id="vaGrid"></div>
    <div id="vaEmpty" style="display:none;text-align:center;padding:50px 0;color:var(--ink-50)">Nenhum registro nesta aba.</div>
  </div>

  <div class="modal-overlay" id="vaModal" onclick="fecharDetalhe(event)">
    <div class="modal-card" style="max-width:760px;width:96vw" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="fecharDetalhe()">&times;</button>
      <div id="vaDetalhe"><div style="padding:40px;text-align:center;opacity:0.5">Carregando…</div></div>
    </div>
  </div>

  <script src="utils.js?v=20260615d"></script>
  <script src="config.js?v=20260615a"></script>
  <script src="auth.js?v=20260611f"></script>
  <script src="shell.js?v=20260611f"></script>
  <script src="assessor-preview.js?v=20260709c"></script>
  <script>
    const STATUS = {
      'aguardando-validacao': { label: 'Aguardando validação', bg: '#fef3c7', fg: '#92400e', accent: '#c2410c' },
      'ajustes-solicitados':  { label: 'Ajustes solicitados',  bg: '#dbeafe', fg: '#1e40af', accent: '#1e40af' },
      'aprovado':             { label: 'Aprovado',             bg: '#dcfce7', fg: '#166534', accent: '#15803d' },
      'reprovado':            { label: 'Reprovado',            bg: '#fee2e2', fg: '#991b1b', accent: '#dc2626' },
      'publicado':            { label: 'Concluído',            bg: '#dbeafe', fg: '#1e40af', accent: '#1d4ed8' },
      'registrado':           { label: 'Registrado',           bg: '#eef2f7', fg: '#475569', accent: '#475569' },
    };
    const CATEGORIAS = [
      { id: 'pagina',      label: 'Página de Assessor', aprovacao: true },
      { id: 'atualizacao', label: 'Atualização',        aprovacao: true },
      { id: 'sem-pagina',  label: 'Sem Página',         aprovacao: false },
    ];
    const FUNIL = ['todos', 'aguardando-validacao', 'ajustes-solicitados', 'aprovado', 'publicado', 'reprovado'];
    // Concluir (= publicado no site) e do marketing: gestor e admin.
    // Capital Humano valida, mas nao conclui.
    function podePublicar() {
      const r = (typeof Auth !== 'undefined' && Auth.getUserRole) ? Auth.getUserRole() : '';
      return r === 'gestor' || r === 'admin';
    }
    const CONTRATO_LABELS = { 'svn-capital': 'SVN Capital', 'svn-connect': 'SVN Connect', 'svn-investimentos': 'SVN Investimentos' };
    function contratoLabel(c) { return CONTRATO_LABELS[c] || c || '—'; }

    let LINHAS = [];
    let fCategoria = 'pagina';
    let fStatus = 'todos';
    let fBusca = '';
    let fContrato = '';
    let fUnidade = '';
    let detalheId = null;

    function fmtData(v) { if (!v) return ''; try { return new Date(v).toLocaleDateString('pt-BR'); } catch (e) { return ''; } }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function badge(status) { const s = STATUS[status] || { label: status, bg: '#eee', fg: '#333' }; return '<span class="va-badge" style="background:' + s.bg + ';color:' + s.fg + '">' + esc(s.label) + '</span>'; }
    function catAtual() { return CATEGORIAS.find(c => c.id === fCategoria) || CATEGORIAS[0]; }

    async function carregar() {
      try {
        const r = await fetch('/api/assessor-aprovacoes');
        if (!r.ok) throw new Error('falha');
        const j = await r.json();
        LINHAS = j.linhas || [];
      } catch (e) { LINHAS = []; }
      renderTabs();
      renderContratoChips();
      renderUnidades();
      renderFunil();
      renderLista();
      atualizarFilterUI();
    }

    function porCategoria(cat) { return LINHAS.filter(l => l.categoria === cat); }
    // base = categoria atual + contrato + unidade + busca (o funil conta sobre isso)
    function base() {
      const q = fBusca.trim().toLowerCase();
      return porCategoria(fCategoria).filter(l =>
        (!fContrato || (l.contrato_social || '') === fContrato) &&
        (!fUnidade || (l.unidade || '') === fUnidade) &&
        (!q || (String(l.nome || '').toLowerCase().includes(q) || String(l.codigo_assessor || '').toLowerCase().includes(q))));
    }
    function distintos(campo) { return [...new Set(LINHAS.map(l => l[campo]).filter(Boolean))].sort(); }

    function renderTabs() {
      document.getElementById('vaTabs').innerHTML = CATEGORIAS.map(c =>
        '<button class="va-tab' + (fCategoria === c.id ? ' active' : '') + '" onclick="setCategoria(\'' + c.id + '\')">' +
          esc(c.label) + ' <span class="cnt">' + porCategoria(c.id).length + '</span></button>'
      ).join('');
    }
    function renderContratoChips() {
      const cts = distintos('contrato_social');
      document.getElementById('vaContratoChips').innerHTML =
        '<button class="filter-chip' + (fContrato === '' ? ' active' : '') + '" onclick="setContrato(this, \'\')">Todos</button>' +
        cts.map(c => '<button class="filter-chip' + (fContrato === c ? ' active' : '') + '" onclick="setContrato(this, \'' + esc(c) + '\')">' + esc(contratoLabel(c)) + '</button>').join('');
    }
    function renderUnidades() {
      const uns = distintos('unidade');
      document.getElementById('vaUnidadeChips').innerHTML =
        '<button class="filter-chip' + (fUnidade === '' ? ' active' : '') + '" onclick="setUnidade(this, \'\')">Todas</button>' +
        uns.map(u => '<button class="filter-chip' + (fUnidade === u ? ' active' : '') + '" onclick="setUnidade(this, \'' + esc(u) + '\')">' + esc(u) + '</button>').join('');
    }
    function renderFunil() {
      const el = document.getElementById('vaFunil');
      if (!catAtual().aprovacao) { el.style.display = 'none'; el.innerHTML = ''; return; }
      el.style.display = '';
      const b = base();
      el.innerHTML = FUNIL.map(f => {
        const n = f === 'todos' ? b.length : b.filter(l => l.status === f).length;
        const st = STATUS[f] || { label: 'Todos', accent: 'var(--carbon-black)', bg: 'var(--icon-bg)' };
        const active = fStatus === f;
        const style = 'style="' + (active ? '--etapa:' + (st.accent || 'var(--carbon-black)') + ';--etapa-bg:' + (st.bg || 'var(--icon-bg)') + '33;' : '') + '"';
        return '<div class="stat-card' + (active ? ' active' : '') + '" ' + style + ' onclick="setStatus(\'' + f + '\')">' +
          '<div class="stat-number">' + n + '</div><div class="stat-label">' + (f === 'todos' ? 'Todos' : esc(st.label)) + '</div></div>';
      }).join('');
    }
    function renderLista() {
      const b = base();
      const arr = (catAtual().aprovacao && fStatus !== 'todos') ? b.filter(l => l.status === fStatus) : b;
      const grid = document.getElementById('vaGrid');
      document.getElementById('vaEmpty').style.display = arr.length ? 'none' : 'block';
      document.getElementById('vaCount').textContent = arr.length + ' registro(s)';
      grid.innerHTML = arr.map(l => {
        const foto = l.foto_url ? '<img class="va-thumb" src="' + esc(l.foto_url) + '" alt="">' : '<div class="va-thumb"></div>';
        const st = catAtual().aprovacao ? (' <div style="margin-top:6px">' + badge(l.status) + (l.ciclo > 1 ? ' <span class="sub">ciclo ' + l.ciclo + '</span>' : '') + '</div>') : '';
        return '<div class="va-card" onclick="abrirDetalhe(' + l.solicitacao_id + ')">' + foto +
          '<div style="flex:1;min-width:0">' +
          '<div class="nm">' + esc(l.nome || '—') + '</div>' +
          '<div class="sub">' + esc(l.unidade || '') + (l.codigo_assessor ? ' · ' + esc(l.codigo_assessor) : '') + '</div>' +
          (l.criado_em ? '<div class="sub" style="opacity:0.7;font-size:0.72rem;margin-top:2px">Solicitado em ' + fmtData(l.criado_em) + '</div>' : '') + st +
          '</div></div>';
      }).join('');
    }

    function setCategoria(c) { fCategoria = c; fStatus = 'todos'; renderTabs(); renderFunil(); renderLista(); }
    function setStatus(f) { fStatus = f; renderFunil(); renderLista(); }
    function setBusca(v) { fBusca = v; renderFunil(); renderLista(); }
    function setContrato(el, c) { fContrato = c; [...document.querySelectorAll('#vaContratoChips .filter-chip')].forEach(x => x.classList.remove('active')); el.classList.add('active'); renderFunil(); renderLista(); atualizarFilterUI(); }
    function setUnidade(el, u) { fUnidade = u; [...document.querySelectorAll('#vaUnidadeChips .filter-chip')].forEach(x => x.classList.remove('active')); el.classList.add('active'); renderFunil(); renderLista(); atualizarFilterUI(); }
    function limparFiltros() { fContrato = ''; fUnidade = ''; renderContratoChips(); renderUnidades(); renderFunil(); renderLista(); atualizarFilterUI(); }
    function atualizarFilterUI() {
      const ativos = (fContrato ? 1 : 0) + (fUnidade ? 1 : 0);
      const badgeEl = document.getElementById('vaFilterBadge'), clear = document.getElementById('vaFilterClear'), toggle = document.getElementById('vaFilterToggle');
      if (ativos > 0) { badgeEl.textContent = ativos; badgeEl.style.display = ''; clear.style.display = ''; toggle.classList.add('has-filters'); }
      else { badgeEl.style.display = 'none'; clear.style.display = 'none'; toggle.classList.remove('has-filters'); }
    }
    function toggleFilterPanel(e) { if (e) e.stopPropagation(); document.getElementById('vaFilterPanel').classList.toggle('open'); }
    document.addEventListener('click', function (e) {
      const panel = document.getElementById('vaFilterPanel');
      if (panel && panel.classList.contains('open') && !panel.contains(e.target) && !document.getElementById('vaFilterToggle').contains(e.target)) panel.classList.remove('open');
    });

    async function abrirDetalhe(id) {
      detalheId = id;
      document.getElementById('vaModal').classList.add('visible');
      document.getElementById('vaDetalhe').innerHTML = '<div style="padding:40px;text-align:center;opacity:0.5">Carregando…</div>';
      let data;
      try { const r = await fetch('/api/assessor-aprovacoes/' + id); data = await r.json(); }
      catch (e) { document.getElementById('vaDetalhe').innerHTML = '<div style="padding:30px;text-align:center;color:var(--danger)">Erro ao carregar.</div>'; return; }
      window._vaDados = data;   // guarda para a edição
      const resumo = data.resumo || {};
      const pub = data.publicacao || {};
      const dados = data.dados || {};
      if (!dados.foto_url && !dados.foto_perfil && pub.foto_url) dados.foto_url = pub.foto_url;
      const aprovacao = resumo.categoria === 'pagina' || resumo.categoria === 'atualizacao';
      const editavel = aprovacao && (resumo.status === 'aguardando-validacao' || resumo.status === 'ajustes-solicitados');

      let rodape;
      if (!aprovacao) {
        rodape = '<div class="va-actions"><span class="sub" style="font-size:0.8rem;color:var(--ink-50)">Registro sem página — apenas leitura.</span></div>';
      } else if (editavel) {
        rodape =
          '<div style="margin-top:16px"><div style="font-size:0.72rem;color:var(--ink-50);margin-bottom:4px">Observação interna (para o marketing) <span style="opacity:0.7">— uso interno, não é enviada ao assessor</span></div>' +
            '<textarea id="vaObs" style="width:100%;box-sizing:border-box;min-height:56px;font:inherit;font-size:0.85rem;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius-md);resize:vertical" placeholder="Direções para o time de marketing. Obrigatória ao solicitar ajustes ou reprovar; opcional ao aprovar."></textarea></div>' +
          '<div class="va-actions">' +
            '<button class="btn btn-primary" onclick="decidir(\'aprovado\')">Aprovar</button>' +
            '<button class="btn btn-dark" onclick="decidir(\'ajustes\')">Solicitar ajustes</button>' +
            '<button class="btn btn-secondary" style="color:var(--danger);border-color:var(--danger)" onclick="decidir(\'reprovado\')">Reprovar</button>' +
          '</div><div id="vaMsg" style="margin-top:10px;font-size:0.82rem"></div>';
      } else if (resumo.status === 'aprovado' && podePublicar()) {
        // Aprovado = liberado para o marketing publicar. Concluído = já está no ar.
        rodape =
          '<div class="va-actions" style="align-items:center">' +
            '<span class="sub" style="font-size:0.8rem;color:var(--ink-50);margin-right:auto">Aprovado para publicação. Marque como concluído assim que a página estiver no ar.</span>' +
            '<button class="btn btn-primary" onclick="decidir(&#39;publicado&#39;)">Marcar como concluído</button>' +
          '</div><div id="vaMsg" style="margin-top:10px;font-size:0.82rem"></div>';
      } else {
        rodape = '<div class="va-actions"><span class="sub" style="font-size:0.8rem;color:var(--ink-50)">Perfil já ' + (STATUS[resumo.status] ? STATUS[resumo.status].label.toLowerCase() : resumo.status) + '.</span></div>';
      }

      // Admin pode corrigir os dados do perfil (ex.: contrato social errado),
      // independente do status — a correcao reflete nos filtros.
      const ehAdmin = (typeof Auth !== 'undefined' && Auth.getUserRole && Auth.getUserRole() === 'admin');
      if (aprovacao && ehAdmin) {
        rodape =
          '<div style="text-align:right;margin-bottom:8px">' +
            '<button class="btn btn-secondary" style="padding:4px 12px;font-size:0.78rem" onclick="abrirEdicao()">Editar dados</button>' +
          '</div>' + rodape;
      }

      const cabecalho =
        (resumo.categoria === 'atualizacao' ? '<div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ruby-red);margin-bottom:8px">Atualização de página</div>' : '') +
        (pub.observacao ? '<div class="alert-card alert-info" style="margin:0 0 12px;font-size:0.82rem"><strong>Observação interna anterior:</strong> ' + esc(pub.observacao) + '</div>' : '') +
        (resumo.ciclo > 1 ? '<div style="text-align:right;font-size:0.74rem;color:var(--ink-50);margin-bottom:6px">Ciclo ' + resumo.ciclo + '</div>' : '');

      document.getElementById('vaDetalhe').innerHTML = cabecalho +
        '<div id="vaPreview"></div>' +
        '<p style="text-align:center;margin:8px 0 0;font-size:0.72rem;opacity:0.45">Simulação. O layout final pode variar conforme o site institucional.</p>' +
        rodape;

      const internos = [
        { label: 'Código', value: dados.codigo_assessor },
        { label: 'Contrato', value: contratoLabel(dados.contrato_social) },
        { label: 'Unidade', value: dados.unidade },
        { label: 'Solicitada em', value: fmtData(resumo.criado_em) },
      ];
      if (window.renderAssessorPreview) window.renderAssessorPreview(document.getElementById('vaPreview'), dados, { internos: internos, statusHtml: aprovacao ? badge(resumo.status) : '' });
    }

    function abrirEdicao() {
      const d = (window._vaDados && window._vaDados.dados) || {};
      const contratos = (window._svnFormSchemas && window._svnFormSchemas.contratos) || [];
      const unidades = (typeof UNIDADES_SVN !== 'undefined' ? UNIDADES_SVN : []);
      const optSel = (arr, val, getV, getL) =>
        arr.map(function (o) {
          const vv = getV(o), ll = getL(o);
          return '<option value="' + esc(vv) + '"' + (String(vv) === String(val) ? ' selected' : '') + '>' + esc(ll) + '</option>';
        }).join('');

      const contratoOpts = '<option value="">Selecione</option>' +
        optSel(contratos, d.contrato_social, function (o) { return o.value != null ? o.value : o; }, function (o) { return o.label != null ? o.label : o; });
      const unidadeOpts = '<option value="">Selecione</option>' +
        optSel(unidades, d.unidade, function (o) { return o.nome != null ? o.nome : o; }, function (o) { return o.nome != null ? o.nome : o; });

      const campo = (lab, html) =>
        '<div style="margin-bottom:12px"><label style="display:block;font-size:0.74rem;color:var(--ink-50);margin-bottom:4px">' + lab + '</label>' + html + '</div>';
      const inp = (id, val) =>
        '<input id="' + id + '" style="width:100%;box-sizing:border-box;font:inherit;font-size:0.88rem;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius-md)" value="' + esc(val || '') + '">';
      const sel = (id, opts, extra) =>
        '<select id="' + id + '"' + (extra || '') + ' style="width:100%;box-sizing:border-box;font:inherit;font-size:0.88rem;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius-md)">' + opts + '</select>';

      const codAtual = String(d.codigo_assessor || '').replace(/^A/i, '');

      document.getElementById('vaDetalhe').innerHTML =
        '<div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ruby-red);margin-bottom:12px">Editar dados do perfil</div>' +
        campo('Nome completo', inp('edNome', d.nome_completo || d.nome)) +
        campo('Código do assessor', '<div style="display:flex;align-items:stretch"><span style="display:flex;align-items:center;padding:0 10px;border:1px solid var(--border-light);border-right:0;border-radius:var(--radius-md) 0 0 var(--radius-md);background:var(--icon-bg);color:var(--ink-60);font-weight:600">A</span><input id="edCodigo" inputmode="numeric" style="flex:1;min-width:0;font:inherit;font-size:0.88rem;padding:8px 10px;border:1px solid var(--border-light);border-radius:0 var(--radius-md) var(--radius-md) 0" value="' + esc(codAtual) + '" oninput="this.value=this.value.replace(/\\D/g,\'\')"></div>') +
        campo('Contrato social', sel('edContrato', contratoOpts)) +
        campo('Unidade', sel('edUnidade', unidadeOpts)) +
        '<div class="va-actions">' +
          '<button class="btn btn-primary" onclick="salvarEdicao()">Salvar correções</button>' +
          '<button class="btn btn-secondary" onclick="abrirDetalhe(detalheId)">Cancelar</button>' +
        '</div><div id="vaEditMsg" style="margin-top:10px;font-size:0.82rem"></div>';
      window._vaEditar = true;
    }

    async function salvarEdicao() {
      const msg = document.getElementById('vaEditMsg');
      msg.style.color = 'var(--ink-50)'; msg.textContent = 'Salvando…';
      const num = (document.getElementById('edCodigo').value || '').replace(/\D/g, '');
      const payload = {
        nome: document.getElementById('edNome').value,
        codigo_assessor: num ? 'A' + num : '',
        contrato_social: document.getElementById('edContrato').value,
        unidade: document.getElementById('edUnidade').value,
      };
      try {
        const r = await fetch('/api/assessor-aprovacoes/' + detalheId, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(function () { return {}; });
        if (!r.ok) throw new Error(j.error || 'Falha ao salvar.');
        await abrirDetalhe(detalheId);   // recarrega com os dados novos
        await carregar();                // atualiza a lista/filtros
      } catch (e) {
        msg.style.color = 'var(--danger)'; msg.textContent = e.message || 'Erro ao salvar.';
      }
    }

    async function decidir(decisao) {
      const obs = (document.getElementById('vaObs') || {}).value || '';
      const msg = document.getElementById('vaMsg');
      if ((decisao === 'ajustes' || decisao === 'reprovado') && !obs.trim()) {
        msg.style.color = 'var(--danger)';
        msg.textContent = decisao === 'ajustes' ? 'Descreva na observação o que precisa ser ajustado (para o marketing encaminhar).' : 'Escreva o motivo da reprovação na observação (uso interno).';
        return;
      }
      msg.style.color = 'var(--ink-50)'; msg.textContent = 'Salvando…';
      try {
        const r = await fetch('/api/assessor-aprovacoes/' + detalheId + '/decisao', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ decisao, observacao: obs, ajustes: [] }),
        });
        if (!r.ok) throw new Error('falha');
        fecharDetalhe();
        await carregar();
      } catch (e) { msg.style.color = 'var(--danger)'; msg.textContent = 'Erro ao registrar a decisão.'; }
    }

    function fecharDetalhe(e) {
      if (e && e.target !== document.getElementById('vaModal')) return;
      document.getElementById('vaModal').classList.remove('visible');
      detalheId = null;
    }

    async function init() {
      try { if (typeof _configReady !== 'undefined') await _configReady; } catch (e) {}
      await Auth.init();
      if (!Auth.isAuthenticated()) { window.location.href = '/auth/login?redirect=/validacao-assessores.html'; return; }
      const role = Auth.getUserRole ? Auth.getUserRole() : (Auth.getUser && Auth.getUser().role);
      if (role !== 'capital_humano' && role !== 'gestor' && role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      document.getElementById('pageRoot').style.display = '';
      if (typeof Shell !== 'undefined' && Shell.render) {
        Shell.render({ activeRoute: 'validacao-assessores', contentEl: document.getElementById('pageRoot') });
      }
      carregar();
    }
    init();
  </script>
</body>
</html>
