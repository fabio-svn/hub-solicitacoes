<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Solicitacoes SVN</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-dark">
  <div class="container-narrow" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div class="hero-card" style="border-radius:16px;overflow:hidden;width:100%;max-width:640px;height:340px;position:relative">
      <video autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" id="heroVideo">
        <source src="" type="video/mp4">
      </video>
      <div style="position:absolute;inset:0;background:rgba(20,12,10,0.72);mix-blend-mode:multiply"></div>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center">
        <p style="font-weight:300;font-size:0.9rem;opacity:0.6;margin-bottom:20px">O que voce gostaria de fazer?</p>
        <div class="hero-buttons" style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
          <button class="btn-ghost-dark red" onclick="goTo('solicitacoes.html')" style="font-family:'Nunito Sans',sans-serif">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Quero fazer uma solicitacao
          </button>
          <button class="btn-ghost-dark green" onclick="goTo('dashboard.html')" style="font-family:'Nunito Sans',sans-serif">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            Quero acompanhar uma solicitacao
          </button>
        </div>
      </div>
    </div>
    <img id="logoBottom" alt="SVN" style="height:28px;opacity:0.55;margin-top:32px">
    <div id="errorMsg" style="display:none;margin-top:16px;background:rgba(159,63,55,0.15);border:1px solid var(--ruby-red);border-radius:8px;padding:12px 16px;font-size:0.85rem;text-align:center;max-width:500px"></div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('heroVideo').src = URL_VIDEO_HERO;
    document.getElementById('logoBottom').src = URL_LOGO_BRANCA;

    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const el = document.getElementById('errorMsg');
      el.style.display = 'block';
      if (error === 'domain_not_allowed') {
        el.textContent = 'Apenas contas @svninvest.com.br sao aceitas. Por favor, use seu e-mail corporativo.';
      } else if (error === 'login_failed' || error === 'auth_failed') {
        el.textContent = 'Falha na autenticacao. Tente novamente.';
      } else {
        el.textContent = 'Ocorreu um erro. Tente novamente.';
      }
    }

    async function goTo(page) {
      await Auth.init();
      if (!Auth.isAuthenticated()) {
        window.location.href = '/auth/login?redirect=/' + page;
        return;
      }
      window.location.href = '/' + page;
    }
  </script>
</body>
</html>
