<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Solicitações - Hub SVN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&family=Taviraj:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-light">
  <header class="header" id="mainHeader"></header>
  <div class="container">
    <div class="title-row">
      <h1 class="page-title">Minhas solicitações</h1>
      <a href="/solicitacoes.html" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova solicitação
      </a>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card" style="background:rgba(159,63,55,0.06);border-color:rgba(159,63,55,0.15)">
        <div class="stat-number" style="color:var(--ruby-red)" id="statActive">0</div>
        <div class="stat-label">Em andamento</div>
      </div>
      <div class="stat-card" style="background:rgba(111,135,123,0.06);border-color:rgba(111,135,123,0.15)">
        <div class="stat-number" style="color:var(--sage-green)" id="statCompleted">0</div>
        <div class="stat-label">Concluídas</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="eventos" onclick="switchTab('eventos')">Eventos</button>
      <button class="tab" data-tab="geral" onclick="switchTab('geral')">Solicitações gerais</button>
    </div>

    <div class="tab-content active" id="tab-eventos">
      <div class="filter-bar" id="filterBarEventos">
        <button class="filter-toggle-btn" id="filterToggleEventos" onclick="toggleFilterPanel('eventos')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtrar
          <span class="filter-count-badge" id="filterCountEventos" style="display:none">0</span>
        </button>
        <div id="filterActiveBadgesEventos" style="display:contents"></div>
        <button class="filter-clear-btn" id="filterClearEventos" style="display:none" onclick="clearAllFilters('eventos')">Limpar tudo</button>
      </div>
      <div class="filter-panel" id="filterPanelEventos">
        <div class="filter-panel-row">
          <span class="filter-panel-label">Período</span>
          <button class="filter-chip active" data-filter="periodo" data-value="" data-label="Todos os períodos" onclick="toggleFilter(this,'eventos','periodo')">Todos</button>
          <button class="filter-chip" data-filter="periodo" data-value="hoje" data-label="Hoje" onclick="toggleFilter(this,'eventos','periodo')">Hoje</button>
          <button class="filter-chip" data-filter="periodo" data-value="7dias" data-label="7 dias" onclick="toggleFilter(this,'eventos','periodo')">7 dias</button>
          <button class="filter-chip" data-filter="periodo" data-value="30dias" data-label="30 dias" onclick="toggleFilter(this,'eventos','periodo')">30 dias</button>
        </div>
        <div class="filter-panel-row">
          <span class="filter-panel-label">Natureza</span>
          <button class="filter-chip active" data-filter="natureza" data-value="" data-label="Todas as naturezas" onclick="toggleFilter(this,'eventos','natureza')">Todos</button>
          <button class="filter-chip" data-filter="natureza" data-value="presencial" data-label="Presencial" onclick="toggleFilter(this,'eventos','natureza')">Presencial</button>
          <button class="filter-chip" data-filter="natureza" data-value="online" data-label="Online" onclick="toggleFilter(this,'eventos','natureza')">Online</button>
        </div>
        <div class="filter-panel-row">
          <span class="filter-panel-label">Status</span>
          <button class="filter-chip active" data-filter="status" data-value="" data-label="Todos os status" onclick="toggleFilter(this,'eventos','status')">Todos</button>
          <button class="filter-chip" data-filter="status" data-value="recebido" data-label="Recebido" onclick="toggleFilter(this,'eventos','status')">Recebido</button>
          <button class="filter-chip" data-filter="status" data-value="em-producao" data-label="Em produção" onclick="toggleFilter(this,'eventos','status')">Em produção</button>
          <button class="filter-chip" data-filter="status" data-value="aguardando" data-label="Aguardando" onclick="toggleFilter(this,'eventos','status')">Aguardando</button>
          <button class="filter-chip" data-filter="status" data-value="concluido" data-label="Concluído" onclick="toggleFilter(this,'eventos','status')">Concluído</button>
        </div>
      </div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Buscar por nome do evento..." id="searchEventos" oninput="debounceSearch('eventos')">
      </div>
      <div id="listEventos"></div>
      <div class="pagination" id="paginationEventos"></div>
    </div>

    <div class="tab-content" id="tab-geral">
      <div class="filter-bar" id="filterBarGeral">
        <button class="filter-toggle-btn" id="filterToggleGeral" onclick="toggleFilterPanel('geral')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtrar
          <span class="filter-count-badge" id="filterCountGeral" style="display:none">0</span>
        </button>
        <div id="filterActiveBadgesGeral" style="display:contents"></div>
        <button class="filter-clear-btn" id="filterClearGeral" style="display:none" onclick="clearAllFilters('geral')">Limpar tudo</button>
      </div>
      <div class="filter-panel" id="filterPanelGeral">
        <div class="filter-panel-row">
          <span class="filter-panel-label">Período</span>
          <button class="filter-chip active" data-filter="periodo" data-value="" data-label="Todos os períodos" onclick="toggleFilter(this,'geral','periodo')">Todos</button>
          <button class="filter-chip" data-filter="periodo" data-value="hoje" data-label="Hoje" onclick="toggleFilter(this,'geral','periodo')">Hoje</button>
          <button class="filter-chip" data-filter="periodo" data-value="7dias" data-label="7 dias" onclick="toggleFilter(this,'geral','periodo')">7 dias</button>
          <button class="filter-chip" data-filter="periodo" data-value="30dias" data-label="30 dias" onclick="toggleFilter(this,'geral','periodo')">30 dias</button>
        </div>
        <div class="filter-panel-row">
          <span class="filter-panel-label">Tipo</span>
          <button class="filter-chip active" data-filter="tipo" data-value="" data-label="Todos os tipos" onclick="toggleFilter(this,'geral','tipo')">Todos</button>
          <button class="filter-chip" data-filter="tipo" data-value="pagina-assessores" data-label="Página de Assessores" onclick="toggleFilter(this,'geral','tipo')">Página de Assessores</button>
          <button class="filter-chip" data-filter="tipo" data-value="apresentacao" data-label="Apresentação" onclick="toggleFilter(this,'geral','tipo')">Apresentação</button>
          <button class="filter-chip" data-filter="tipo" data-value="artes-divulgacao" data-label="Artes de Divulgação" onclick="toggleFilter(this,'geral','tipo')">Artes de Divulgação</button>
          <button class="filter-chip" data-filter="tipo" data-value="conteudo-pdf" data-label="PDF" onclick="toggleFilter(this,'geral','tipo')">PDF</button>
          <button class="filter-chip" data-filter="tipo" data-value="atualizacao-material" data-label="Atualização de Material" onclick="toggleFilter(this,'geral','tipo')">Atualização de Material</button>
        </div>
        <div class="filter-panel-row">
          <span class="filter-panel-label">Status</span>
          <button class="filter-chip active" data-filter="status" data-value="" data-label="Todos os status" onclick="toggleFilter(this,'geral','status')">Todos</button>
          <button class="filter-chip" data-filter="status" data-value="recebido" data-label="Recebido" onclick="toggleFilter(this,'geral','status')">Recebido</button>
          <button class="filter-chip" data-filter="status" data-value="em-producao" data-label="Em produção" onclick="toggleFilter(this,'geral','status')">Em produção</button>
          <button class="filter-chip" data-filter="status" data-value="aguardando" data-label="Aguardando" onclick="toggleFilter(this,'geral','status')">Aguardando</button>
          <button class="filter-chip" data-filter="status" data-value="concluido" data-label="Concluído" onclick="toggleFilter(this,'geral','status')">Concluído</button>
        </div>
      </div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Buscar..." id="searchGeral" oninput="debounceSearch('geral')">
      </div>
      <div id="listGeral"></div>
      <div class="pagination" id="paginationGeral"></div>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div>
        <div id="drawerTitle" style="font-weight:700;font-size:1.1rem;margin-bottom:8px"></div>
        <div id="drawerBadges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div id="drawerFluxo" style="padding:16px 24px;border-bottom:1px solid var(--border-light)"></div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    let currentTab = 'eventos';
    let filters = {
      eventos: { periodo: '', status: '', natureza: '' },
      geral: { periodo: '', status: '', tipo: '' }
    };
    let pages = { eventos: 1, geral: 1 };
    let searchTimeout;
    let itemsCache = {};

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    async function init() {
      await _configReady;
      await Auth.init();
      if (!Auth.isAuthenticated()) {
        window.location.href = '/auth/login?redirect=/dashboard.html';
        return;
      }
      Auth.renderHeader(document.getElementById('mainHeader'));
      loadStats();
      loadList('eventos');
      setTimeout(() => loadList('geral'), 800);
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/solicitacoes/stats');
        const data = await res.json();
        animateNumber('statActive', data.active);
        animateNumber('statCompleted', data.completed);
      } catch (e) { console.error(e); }
    }

    function animateNumber(id, target) {
      const el = document.getElementById(id);
      if (!el) return;
      if (!target || target === 0) { el.textContent = '0'; return; }
      let current = 0;
      const duration = 600;
      const step = target / (duration / 16);
      const timer = setInterval(() => {
        current += step;
        if (current >= target) { current = target; clearInterval(timer); }
        el.textContent = Math.round(current);
      }, 16);
    }

    async function loadList(tab) {
      const listEl = document.getElementById(tab === 'eventos' ? 'listEventos' : 'listGeral');
      listEl.innerHTML = [1,2,3].map(() => `
        <div style="background:var(--icon-bg);border-radius:12px;height:64px;margin-bottom:12px;overflow:hidden;position:relative">
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,0.5) 50%,transparent 75%);background-size:200% 100%;animation:shimmer 1.2s infinite"></div>
        </div>
      `).join('');

      const params = new URLSearchParams();
      params.set('page', pages[tab]);
      params.set('limit', '20');

      if (tab === 'eventos') {
        params.set('tipo_solicitacao', 'eventos');
      } else {
        params.set('tipo_solicitacao', 'geral');
      }

      const f = filters[tab];
      if (f.periodo) params.set('periodo', f.periodo);
      if (f.status) params.set('status', f.status);
      if (tab === 'eventos' && f.natureza) params.set('natureza', f.natureza);
      if (tab === 'geral' && f.tipo) params.set('subtipo_filter', f.tipo);

      const searchEl = document.getElementById(tab === 'eventos' ? 'searchEventos' : 'searchGeral');
      if (searchEl && searchEl.value.trim()) {
        params.set('busca', searchEl.value.trim());
      }

      try {
        const res = await fetch('/api/solicitacoes?' + params.toString());
        const data = await res.json();
        renderList(tab, data);
      } catch (e) {
        console.error(e);
      }
    }

    function renderList(tab, data) {
      const container = document.getElementById(tab === 'eventos' ? 'listEventos' : 'listGeral');

      if (!data.data || data.data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 80 80" fill="none" stroke="var(--ruby-red)" stroke-width="1.5"><rect x="12" y="8" width="56" height="64" rx="4"/><line x1="24" y1="24" x2="56" y2="24"/><line x1="24" y1="36" x2="56" y2="36"/><line x1="24" y1="48" x2="44" y2="48"/></svg>
            <p>Você ainda não fez nenhuma solicitação${tab === 'eventos' ? ' de evento' : ''}.</p>
            <a href="/solicitacoes.html" class="btn btn-primary">Fazer primeira solicitação</a>
          </div>`;
        document.getElementById(tab === 'eventos' ? 'paginationEventos' : 'paginationGeral').innerHTML = '';
        return;
      }

      data.data.forEach((item, idx) => {
        const cacheKey = tab + '_' + idx + '_' + pages[tab];
        itemsCache[cacheKey] = item;
      });

      container.innerHTML = data.data.map((item, idx) => {
        const cacheKey = tab + '_' + idx + '_' + pages[tab];
        let dados = {};
        try { dados = typeof item.dados === 'string' ? JSON.parse(item.dados) : (item.dados || {}); } catch { dados = {}; }
        const titulo = dados.nomeEvento || dados.tituloEvento || dados.titulo || dados.nomeCompleto || item.tipo_solicitacao;
        const tipoLabel = TIPO_SOLICITACAO_LABELS[item.tipo_solicitacao] || item.tipo_solicitacao;
        const statusObj = STATUS_SOLICITACAO.find(s => s.id === item.status) || { label: item.status, cor: '--carbon-black' };
        const date = new Date(item.created_at).toLocaleDateString('pt-BR');

        return `<div class="request-card" data-cache="${esc(cacheKey)}" onclick="openDrawerByKey('${esc(cacheKey)}')">
          <div class="request-info">
            <div class="request-title">${esc(titulo)}</div>
            <div class="request-meta">
              <span>${esc(tipoLabel)}</span>
              <span>${esc(date)}</span>
            </div>
          </div>
          <div class="request-badges">
            <span class="badge" style="background:${statusObj.bg || '#f1f5f9'};color:${statusObj.text || '#475569'}">${esc(statusObj.label)}</span>
          </div>
          <div class="request-chevron">&rsaquo;</div>
        </div>`;
      }).join('');

      setTimeout(() => {
        container.querySelectorAll('.request-card').forEach((card, i) => {
          card.style.animationDelay = (i * 40) + 'ms';
        });
      }, 0);

      renderPagination(tab, data);
    }

    function renderPagination(tab, data) {
      const container = document.getElementById(tab === 'eventos' ? 'paginationEventos' : 'paginationGeral');
      if (data.totalPages <= 1) { container.innerHTML = ''; return; }

      let html = '';
      html += `<button ${data.page <= 1 ? 'disabled' : ''} onclick="goPage('${tab}',${data.page - 1})">&laquo;</button>`;
      for (let i = 1; i <= data.totalPages; i++) {
        html += `<button class="${i === data.page ? 'active' : ''}" onclick="goPage('${tab}',${i})">${i}</button>`;
      }
      html += `<button ${data.page >= data.totalPages ? 'disabled' : ''} onclick="goPage('${tab}',${data.page + 1})">&raquo;</button>`;
      container.innerHTML = html;
    }

    function goPage(tab, page) { pages[tab] = page; loadList(tab); }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
      const otherTab = tab === 'eventos' ? 'geral' : 'eventos';
      Object.keys(itemsCache).forEach(k => { if (k.startsWith(otherTab + '_')) delete itemsCache[k]; });
      const listEl = document.getElementById(tab === 'eventos' ? 'listEventos' : 'listGeral');
      if (listEl && !listEl.hasChildNodes()) loadList(tab);
    }

    function toggleFilter(el, tab, filterKey) {
      const siblings = el.closest('.filter-panel-row').querySelectorAll('.filter-chip');
      siblings.forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      filters[tab][filterKey] = el.dataset.value;
      pages[tab] = 1;
      loadList(tab);
      updateFilterBadges(tab);
    }

    function toggleFilterPanel(tab) {
      const panel = document.getElementById('filterPanel' + capitalize(tab));
      const btn = document.getElementById('filterToggle' + capitalize(tab));
      const isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      btn.style.borderColor = (!isOpen || hasActiveFilters(tab)) ? 'var(--ruby-red)' : '';
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function hasActiveFilters(tab) {
      return Object.values(filters[tab]).some(v => v !== '');
    }

    function updateFilterBadges(tab) {
      const capTab = capitalize(tab);
      const badgesContainer = document.getElementById('filterActiveBadges' + capTab);
      const countBadge = document.getElementById('filterCount' + capTab);
      const clearBtn = document.getElementById('filterClear' + capTab);
      const toggleBtn = document.getElementById('filterToggle' + capTab);
      const activeFilters = Object.entries(filters[tab]).filter(([k, v]) => v !== '');
      const count = activeFilters.length;
      countBadge.style.display = count > 0 ? 'inline' : 'none';
      countBadge.textContent = count;
      clearBtn.style.display = count > 0 ? 'inline' : 'none';
      toggleBtn.classList.toggle('has-filters', count > 0);
      badgesContainer.innerHTML = activeFilters.map(([key, value]) => {
        const chip = document.querySelector(`#filterPanel${capTab} [data-filter="${key}"][data-value="${value}"]`);
        const label = chip ? chip.dataset.label || chip.textContent : value;
        return `<span class="filter-active-badge">${label}<span class="remove-badge" onclick="removeFilter('${tab}','${key}')">×</span></span>`;
      }).join('');
    }

    function removeFilter(tab, filterKey) {
      filters[tab][filterKey] = '';
      pages[tab] = 1;
      const capTab = capitalize(tab);
      const defaultChip = document.querySelector(`#filterPanel${capTab} [data-filter="${filterKey}"][data-value=""]`);
      if (defaultChip) {
        const siblings = defaultChip.closest('.filter-panel-row').querySelectorAll('.filter-chip');
        siblings.forEach(s => s.classList.remove('active'));
        defaultChip.classList.add('active');
      }
      loadList(tab);
      updateFilterBadges(tab);
    }

    function clearAllFilters(tab) {
      filters[tab] = tab === 'eventos'
        ? { periodo: '', status: '', natureza: '' }
        : { periodo: '', status: '', tipo: '' };
      pages[tab] = 1;
      const capTab = capitalize(tab);
      document.querySelectorAll(`#filterPanel${capTab} .filter-chip`).forEach(chip => {
        chip.classList.toggle('active', chip.dataset.value === '');
      });
      loadList(tab);
      updateFilterBadges(tab);
    }

    function debounceSearch(tab) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => { pages[tab] = 1; loadList(tab); }, 300);
    }

    function openDrawerByKey(key) {
      const item = itemsCache[key];
      if (!item) return;
      openDrawer(item);
    }

    function getStatusColor(statusId) {
      const map = {
        'recebido':               { bg: '#e8f4ea', text: '#2d7a3a' },
        'alinhamentos':           { bg: '#e8f0fb', text: '#1a56a0' },
        'em-andamento':           { bg: '#fff3e0', text: '#b45309' },
        'cotacao-aprovacao':      { bg: '#fef3c7', text: '#92660a' },
        'aguardando-pagamento':   { bg: '#fce8f3', text: '#9d174d' },
        'aguardando-finalizacao': { bg: '#ede9fe', text: '#5b21b6' },
        'concluido':              { bg: '#d1fae5', text: '#065f46' },
        'reprovado':              { bg: '#fee2e2', text: '#991b1b' },
        'cancelado':              { bg: '#fee2e2', text: '#991b1b' },
        'em-espera':              { bg: '#f1f5f9', text: '#475569' },
        'em-analise':             { bg: '#fff3e0', text: '#b45309' },
        'em-producao':            { bg: '#fff3e0', text: '#b45309' },
        'aguardando':             { bg: '#fef3c7', text: '#92660a' },
        'aguardando-rh':          { bg: '#fce8f3', text: '#9d174d' },
      };
      return map[statusId] || { bg: '#f1f5f9', text: '#475569' };
    }

    function humanizeValue(key, value) {
      const maps = {
        natureza:   { presencial: 'Presencial', online: 'Online' },
        maturidade: { 1: 'Tenho a maioria das informações', 2: 'Tenho algumas informações', 3: 'Ainda estou estruturando' },
        localEvento: { unidade: 'Unidade SVN', externo: 'Local externo', 'nao-definido': 'Não definido' },
        publico: {
          'Fechado para convidados': 'Fechado para convidados',
          'Aberto ao publico em geral': 'Aberto ao público em geral',
        },
      };
      const materiaisMap = {};
      if (typeof ITENS_MATERIAIS !== 'undefined') ITENS_MATERIAIS.forEach(i => { materiaisMap[i.id] = i.label; });
      if (typeof ITENS_MATERIAIS_ONLINE !== 'undefined') ITENS_MATERIAIS_ONLINE.forEach(i => { materiaisMap[i.id] = i.label; });

      if (key === 'materiais' && Array.isArray(value)) return value.map(v => materiaisMap[v] || v).join(', ');
      if (key === 'selos' && Array.isArray(value)) {
        if (typeof SELOS_ASSESSOR !== 'undefined') {
          const selosMap = {};
          SELOS_ASSESSOR.forEach(s => { selosMap[s.id] = s.label; });
          return value.map(v => selosMap[v] || v).join(' · ');
        }
      }
      if (maps[key] && maps[key][value] !== undefined) return maps[key][value];
      if (typeof value === 'string' && value.includes('-') && !value.includes(' ') && materiaisMap[value]) return materiaisMap[value];
      return value;
    }

    async function openDrawer(item) {
      document.getElementById('drawerOverlay').classList.add('visible');
      document.getElementById('drawer').classList.add('open');
      renderDrawerContent(item);
      try {
        const syncRes = await fetch('/api/solicitacoes/' + item.id + '/status');
        if (syncRes.ok) {
          const syncData = await syncRes.json();
          if (syncData.updated && syncData.status !== item.status) {
            item.status = syncData.status;
            renderDrawerContent(item);
          }
        }
      } catch {}
    }

    function renderDrawerContent(item) {
      let dados = {};
      try {
        dados = typeof item.dados === 'string' ? JSON.parse(item.dados) : (item.dados || {});
      } catch { dados = {}; }

      const titulo = dados.nomeEvento || dados.tituloEvento || dados.titulo || dados.nomeCompleto || item.tipo_solicitacao;
      const tipoLabel = TIPO_SOLICITACAO_LABELS[item.tipo_solicitacao] || item.tipo_solicitacao;
      const statusObj = STATUS_SOLICITACAO.find(s => s.id === item.status) || { label: item.status, bg: '#f1f5f9', text: '#475569' };

      document.getElementById('drawerTitle').textContent = titulo;
      document.getElementById('drawerBadges').innerHTML = `
        <span class="badge" style="background:var(--carbon-black);color:var(--paper-white)">${esc(tipoLabel)}</span>
        <span class="badge" style="background:${statusObj.bg};color:${statusObj.text}">${esc(statusObj.label)}</span>
      `;

      const tipoBase = item.tipo_solicitacao === 'eventos' ? 'eventos' : '_default';
      const fluxo = (typeof FLUXOS_ETAPAS !== 'undefined')
        ? (FLUXOS_ETAPAS[item.tipo_solicitacao] || FLUXOS_ETAPAS[tipoBase] || FLUXOS_ETAPAS['_default'])
        : [];
      const statusAtual = item.status;
      const etapasVisiveis = fluxo.filter(e => e.visivel);
      const etapaExcepcional = fluxo.find(e => !e.visivel && e.id === statusAtual);
      const idxAtual = etapasVisiveis.findIndex(e => e.id === statusAtual);

      const fluxoEl = document.getElementById('drawerFluxo');
      if (fluxoEl) {
        if (etapaExcepcional) {
          fluxoEl.innerHTML = `
            <div style="background:rgba(159,63,55,0.08);border:1px solid rgba(159,63,55,0.2);border-radius:8px;padding:10px 14px;font-size:0.85rem;font-weight:600;color:var(--ruby-red);display:flex;align-items:center;gap:8px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              ${etapaExcepcional.label}
            </div>`;
        } else if (etapasVisiveis.length > 0) {
          fluxoEl.innerHTML = `
            <p style="font-size:0.7rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;opacity:0.4;margin-bottom:14px">Andamento da solicitação</p>
            <div style="display:flex;align-items:center;gap:0;padding-bottom:28px">
              ${etapasVisiveis.map((etapa, idx) => {
                const isConcluida = idx < idxAtual;
                const isAtual = idx === idxAtual;
                const isUltima = idx === etapasVisiveis.length - 1;
                const cor = getStatusColor(etapa.id);
                const bg = isConcluida ? '#065f46' : isAtual ? cor.bg : 'transparent';
                const border = isConcluida ? '#065f46' : isAtual ? cor.text : 'rgba(34,27,25,0.15)';
                const icone = isConcluida
                  ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`
                  : isAtual ? `<div style="width:6px;height:6px;border-radius:50%;background:${cor.text}"></div>` : '';
                const labelAtual = isAtual
                  ? `<div style="position:absolute;top:28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:0.68rem;font-weight:700;color:${cor.text}">${etapa.label}</div>`
                  : '';
                return `
                  <div style="display:flex;align-items:center;flex:${isUltima ? '0' : '1'};position:relative">
                    <div style="position:relative">
                      <div title="${etapa.label}" style="width:22px;height:22px;border-radius:50%;background:${bg};border:2px solid ${border};display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1">${icone}</div>
                      ${labelAtual}
                    </div>
                    ${!isUltima ? `<div style="flex:1;height:2px;background:${isConcluida ? '#065f46' : 'rgba(34,27,25,0.1)'};min-width:8px"></div>` : ''}
                  </div>`;
              }).join('')}
            </div>`;
        } else {
          fluxoEl.innerHTML = '';
        }
      }

      let bodyHtml = '';
      for (const [key, value] of Object.entries(dados)) {
        if (value === null || value === undefined || value === '') continue;
        const label = (typeof DRAWER_FIELD_LABELS !== 'undefined' && DRAWER_FIELD_LABELS[key]) ? DRAWER_FIELD_LABELS[key] : key;

        if (Array.isArray(value)) {
          if (value.length === 0) continue;
          if (typeof value[0] === 'object') {
            bodyHtml += `<div class="drawer-field"><div class="drawer-field-label">${esc(label)}</div>
              ${value.map(dep => `<div style="background:var(--icon-bg);border-radius:8px;padding:10px 12px;margin-top:6px;font-size:0.85rem">
                ${dep.texto ? `<div style="font-style:italic;margin-bottom:4px">${esc(dep.texto)}</div>` : ''}
                ${dep.nome ? `<div style="font-weight:600;font-size:0.8rem">${esc(dep.nome)}</div>` : ''}
              </div>`).join('')}</div>`;
          } else {
            bodyHtml += `<div class="drawer-field"><div class="drawer-field-label">${esc(label)}</div><div class="drawer-field-value">${esc(humanizeValue(key, value))}</div></div>`;
          }
          continue;
        }
        if (typeof value === 'object') continue;
        bodyHtml += `<div class="drawer-field"><div class="drawer-field-label">${esc(label)}</div><div class="drawer-field-value">${esc(String(humanizeValue(key, value)))}</div></div>`;
      }

      document.getElementById('drawerBody').innerHTML = bodyHtml || '<p style="opacity:0.5">Sem dados adicionais</p>';
      document.getElementById('drawerFooter').textContent = `ID: ${item.id} | Criado em: ${new Date(item.created_at).toLocaleString('pt-BR')}`;
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('visible');
      document.getElementById('drawer').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    init();
  </script>

      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Solicitações</span>
  </a>
  <a href="/" class="float-home">
